<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>eBay利益で、デルベイ！Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --main:    #c0593a;
      --main-h:  #a4472b;
      --main-l:  #f8ece6;
      --accent:  #c0593a;
      --bg:      #f9f7f2;
      --bg2:     #f2ede5;
      --surface: #ffffff;
      --border:  #e8e3db;
      --ink:     #18150f;
      --ink2:    #574e43;
      --ink3:    #9a8e80;
      --green:   #1a9e5c;
      --green-l: #e4f7ee;
      --red:     #d03a3a;
      --red-l:   #fceaea;
      --dollar-bg:  #edf7f2;
      --dollar-bd:  #b8dece;
      --dollar-txt: #1a7f50;
      --yen-bg:     #fef6ea;
      --yen-bd:     #f0d9b0;
      --yen-txt:    #9a6010;
      --r:    14px;
      --r-sm: 10px;
      --r-xs:  6px;
      --r-lg: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--ink);
      padding: 13px 18px 11px;
      display: flex; align-items: center; gap: 11px;
      position: sticky; top: 0; z-index: 100;
    }
    .hd-logo {
      width: 32px; height: 32px; background: var(--main);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hd-logo svg { display: block; }
    .hd-text { flex: 1; }
    .hd-name { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.025em; line-height: 1.15; }
    .hd-name span { color: var(--main); }
    .hd-sub  { font-size: 9.5px; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; margin-top: 1px; }
    .hd-rate {
      font-size: 11px; color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 4px 10px;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0; cursor: pointer;
    }
    .hd-dot { width: 5px; height: 5px; border-radius: 50%; background: #2ecc71; }
    .hd-dot.syncing { background: #f1c40f; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 18px;
    }
    .tab {
      flex: 1; padding: 10px 0 9px; text-align: center;
      color: rgba(255,255,255,0.35); cursor: pointer;
      font-size: 12.5px; font-weight: 400;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: #fff; border-bottom-color: var(--main); font-weight: 500; }

    /* ── Layout ── */
    .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 18px 14px 60px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── Card ── */
    .card {
      background: var(--surface); border-radius: var(--r-lg);
      border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden;
    }
    h2 {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink3);
      margin: 0; padding: 13px 18px 0;
      display: flex; align-items: center; gap: 7px;
    }
    h2::before { content: ''; width: 3px; height: 12px; background: var(--main); border-radius: 2px; flex-shrink: 0; }

    /* ── Form grid ── */
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 13px; padding: 12px 18px 18px;
    }
    .field { display: flex; flex-direction: column; }
    .field.full { grid-column: 1 / 3; }

    label {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.09em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }

    /* ── Input ── */
    .iw { display: flex; align-items: stretch; position: relative; }
    .cb {
      display: flex; align-items: center; justify-content: center;
      min-width: 36px; padding: 0 10px;
      font-size: 15px; font-weight: 700;
      border-radius: var(--r-sm) 0 0 var(--r-sm);
      border: 1px solid; border-right: none;
      flex-shrink: 0; letter-spacing: -0.02em;
    }
    .cb.d { background: var(--dollar-bg); border-color: var(--dollar-bd); color: var(--dollar-txt); }
    .cb.y { background: var(--yen-bg);    border-color: var(--yen-bd);    color: var(--yen-txt); }
    .cb.p { background: var(--bg2);       border-color: var(--border);    color: var(--ink3); font-size: 13px; }

    input {
      padding: 11px 12px;
      border: 1px solid #e5e5e5; border-radius: var(--r-sm);
      font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 400;
      color: var(--ink); background: var(--bg); width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none; min-height: 44px;
    }
    .iw input { border-radius: 0 var(--r-sm) var(--r-sm) 0; border-left: none; flex: 1; }
    input:focus { border-color: var(--main); background: var(--surface); box-shadow: 0 0 0 3px rgba(192,89,58,0.10); }

    /* ── Quick buttons ── */
    .quick-group { display: flex; gap: 7px; margin-top: 8px; }
    .q-btn {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      padding: 10px 4px; border-radius: var(--r-sm);
      font-size: 11.5px; font-weight: 600; color: var(--ink2);
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px; transition: all 0.1s;
    }
    .q-btn:hover { background: var(--main-l); border-color: var(--main); color: var(--main-h); }
    .q-btn:active { transform: scale(0.97); }
    .q-btn small { font-size: 9px; font-weight: 400; opacity: 0.6; }

    /* ── Back-calc ── */
    .btn-toggle {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: calc(100% - 36px); margin: 0 18px 14px;
      padding: 11px; background: var(--bg2);
      border: 1px dashed var(--border); border-radius: var(--r-sm);
      font-size: 12px; font-weight: 500; color: var(--ink2);
      cursor: pointer; transition: all 0.15s;
    }
    #backCalcPanel {
      display: none; background: var(--main-l);
      border: 1px solid rgba(192,89,58,0.20);
      padding: 15px 18px; border-top: none;
    }
    #backCalcPanel > div { display: flex; gap: 8px; margin-top: 7px; }
    #backCalcPanel button {
      background: var(--main); color: #fff; border: none;
      border-radius: var(--r-sm); padding: 0 18px; font-size: 13px; cursor: pointer;
    }

    /* ── Result box ── */
    .result-box {
      background: var(--ink); color: #fff;
      border-radius: var(--r-lg); padding: 20px 20px 18px;
      text-align: center; margin-top: 4px; position: relative; overflow: hidden;
    }
    #profit { font-size: 56px; font-weight: 300; letter-spacing: -0.05em; line-height: 1; margin: 4px 0 6px; }
    .res-row { display: flex; justify-content: space-between; font-size: 10.5px; color: rgba(255,255,255,0.38); margin-bottom: 6px; }

    /* ── Copy Buttons (New) ── */
    .copy-panel { display: flex; gap: 6px; justify-content: center; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
    .btn-copy {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8); padding: 7px 12px; border-radius: 20px; font-size: 11px;
      cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s;
    }
    .btn-copy:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* ── Report Hero ── */
    .report-hero {
      background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 20px; margin-bottom: 10px; position: relative;
    }
    #monthTotal { font-size: 44px; font-weight: 300; text-align: center; margin: 4px 0 12px; cursor: pointer; }
    .goal-meta { display: flex; justify-content: space-between; font-size: 10.5px; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
    .bar-bg { background: rgba(255,255,255,0.1); height: 10px; border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; border-radius: 6px; background: linear-gradient(90deg, #e8593c 0%, #f5a623 60%, #2ecc71 100%); background-size: 200% 100%; transition: width 0.7s cubic-bezier(0.34,1.4,0.64,1); }

    /* ── Ranking (New) ── */
    .ranking-box { margin: 15px 0; }
    .rank-card {
      background: var(--surface); padding: 12px; border-radius: var(--r-sm);
      border: 1px solid var(--border); margin-bottom: 6px; display: flex; align-items: center; gap: 10px;
    }
    .rank-num { font-size: 16px; font-weight: 800; color: var(--main); font-style: italic; width: 20px; }
    .rank-info { flex: 1; }
    .rank-info b { font-size: 13px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .rank-info small { font-size: 10px; color: var(--ink3); }
    .rank-val { font-weight: 600; color: var(--green); text-align: right; }

    /* ── History ── */
    .hist-card {
      background: var(--surface); padding: 12px 14px; border-radius: var(--r-sm); margin-bottom: 6px;
      border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
    }
    .hist-del { color: var(--red); background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 8px; }

    .btn-save { width: 100%; padding: 15px; background: var(--main); color: #fff; border: none; border-radius: var(--r-sm); font-weight: 600; font-size: 15px; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; }
    
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 12px; display: none; z-index: 1000; box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <div class="hd-logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
  </div>
  <div class="hd-text">
    <div class="hd-name">eBay利益で、<span>デルベイ！</span></div>
    <div class="hd-sub">eBay輸出 プロ仕様ツール</div>
  </div>
  <div class="hd-rate" onclick="fetchRate()">
    <div id="rateDot" class="hd-dot"></div>
    <span id="rateDisplay">¥150/$</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-calc" onclick="switchTab('calcPage')">利益計算</div>
  <div class="tab" id="tab-report" onclick="switchTab('reportPage')">集計レポート</div>
</div>

<div class="container">

  <div id="calcPage" class="page active">
    <div class="card">
      <h2>商品メモ</h2>
      <div class="form-grid" style="padding-top:10px;">
        <div class="field full"><input type="text" id="itemName" placeholder="商品名を入力（コピー機能で使えます）"></div>
      </div>
    </div>

    <div class="card">
      <h2>取引情報を入力</h2>
      <div class="form-grid">
        <div class="field"><label>為替レート</label><div class="iw"><div class="cb y">¥</div><input type="number" id="rate" value="150"></div></div>
        <div class="field"><label>eBay手数料</label><div class="iw"><div class="cb p">%</div><input type="number" id="feePercent" value="15"></div></div>
        <div class="field"><label>売値 ($)</label><div class="iw"><div class="cb d">$</div><input type="number" id="saleUsd" placeholder="0.00"></div></div>
        <div class="field"><label>仕入れ (￥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="cost" placeholder="0"></div></div>
        <div class="field full"><label>国際送料 (￥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="shipping" placeholder="0"></div>
          <div class="quick-group">
            <button class="q-btn" onclick="setShipping(3000)">✈ FedEx<small>¥3,000</small></button>
            <button class="q-btn" onclick="setShipping(5000)">📦 EMS<small>¥5,000</small></button>
          </div>
        </div>
      </div>

      <button class="btn-toggle" onclick="toggleBackCalc()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a6 6 0 010 12h-1"/></svg>
        【逆算】いくらで売ればいい？
      </button>
      <div id="backCalcPanel">
        <label>目標の純利益 (円)</label>
        <div><input type="number" id="targetProfit" value="3000"><button onclick="calcBack()">計算</button></div>
      </div>
    </div>

    <div class="result-box">
      <div class="res-row"><span>売上 <span id="salesJpy">¥0</span></span><span>手数料 <span id="feeJpy">¥0</span></span></div>
      <div id="profit">¥0</div>
      <div style="font-size:11.5px; color:rgba(255,255,255,0.35);">利益率 <span id="profitRate">0.0%</span></div>
      
      <div class="copy-panel">
        <button class="btn-copy" onclick="copyVal('title')">📋 タイトル</button>
        <button class="btn-copy" onclick="copyVal('price')">💵 価格($)</button>
        <button class="btn-copy" onclick="copyVal('all')">✨ 全コピー</button>
      </div>
    </div>

    <button class="btn-save" onclick="saveRecord()">利益を記録する</button>
    <button class="btn-reset" onclick="resetInputs()" style="width:100%; border:none; background:none; color:var(--ink3); font-size:11px; margin-top:12px; cursor:pointer;">入力をリセット</button>
  </div>

  <div id="reportPage" class="page">
    <div class="report-hero">
      <h2 style="color:rgba(255,255,255,0.35); padding:0 0 4px; display:flex; justify-content:space-between; align-items:center;">
        📈 今月の進捗 <button class="q-btn" style="max-width:80px; font-size:10px; min-height:24px;" onclick="setGoal()">目標設定</button>
      </h2>
      <div class="goal-meta"><span id="goalText">目標: ¥100,000</span><span id="percentText">0%</span></div>
      <div class="bar-bg"><div id="goalBar" class="bar-fill"></div></div>
      <div id="monthTotal">¥0</div>
      <div style="font-size:9px; text-align:center; color:rgba(255,255,255,0.25); margin-top:-8px;">履歴タップで削除できます</div>
    </div>

    <div class="ranking-box">
      <h2>🏆 利益ランキング (Top 3)</h2>
      <div id="rankingList"></div>
    </div>

    <h2>🕒 最近の履歴</h2>
    <div id="historyList"></div>
    <button onclick="clearAllData()" style="width:100%; margin-top:30px; color:var(--red); background:none; border:none; font-size:11px; opacity:0.5;">データを全削除</button>
  </div>

</div>

<script>
  const ids = ['itemName', 'rate', 'feePercent', 'saleUsd', 'cost', 'shipping'];
  const inputs = {};
  ids.forEach(id => inputs[id] = document.getElementById(id));

  window.onload = () => {
    inputs.rate.value = localStorage.getItem('cfg_rate') || 150;
    inputs.feePercent.value = localStorage.getItem('cfg_fee') || 15;
    fetchRate(); 
    updateReport();
  };

  // 1. 為替レート自動取得
  async function fetchRate() {
    const dot = document.getElementById('rateDot');
    dot.classList.add('syncing');
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      const val = Math.round(data.rates.JPY * 100) / 100;
      inputs.rate.value = val;
      calc();
      showToast(`最新レート ¥${val} を取得しました`);
    } catch (e) {
      showToast("レート取得に失敗しました");
    } finally {
      dot.classList.remove('syncing');
    }
  }

  function switchTab(pId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pId).classList.add('active');
    document.getElementById(pId === 'calcPage' ? 'tab-calc' : 'tab-report').classList.add('active');
    if(pId === 'reportPage') updateReport();
  }

  function setShipping(v) { inputs.shipping.value = v; calc(); }
  function toggleBackCalc() { 
    const p = document.getElementById('backCalcPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
  }

  function calc() {
    const val = (id) => parseFloat(inputs[id].value) || 0;
    localStorage.setItem('cfg_rate', inputs.rate.value);
    const sJpy = Math.round(val('saleUsd') * val('rate'));
    const fJpy = Math.round(sJpy * (val('feePercent') / 100));
    const profit = sJpy - (val('cost') + val('shipping') + fJpy);
    const pRate = sJpy > 0 ? (profit / sJpy) * 100 : 0;

    document.getElementById('salesJpy').textContent = '¥' + sJpy.toLocaleString();
    document.getElementById('feeJpy').textContent = '¥' + fJpy.toLocaleString();
    const pEl = document.getElementById('profit');
    pEl.textContent = (profit >= 0 ? '¥' : '-¥') + Math.abs(profit).toLocaleString();
    pEl.style.color = profit >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('profitRate').textContent = pRate.toFixed(1) + '%';
    document.getElementById('rateDisplay').textContent = '¥' + val('rate') + '/$';
  }
  ids.forEach(id => inputs[id].addEventListener('input', calc));

  function calcBack() {
    const target = parseFloat(document.getElementById('targetProfit').value) || 0;
    const rate = parseFloat(inputs.rate.value);
    const fee = parseFloat(inputs.feePercent.value) / 100;
    const res = (target + (parseFloat(inputs.cost.value)||0) + (parseFloat(inputs.shipping.value)||0)) / (rate * (1 - fee));
    inputs.saleUsd.value = Math.ceil(res);
    calc();
    showToast("売値を逆算しました");
  }

  // 2. コピー機能
  function copyVal(type) {
    let t = "";
    if(type==='title') t = inputs.itemName.value || "No Title";
    if(type==='price') t = inputs.saleUsd.value || "0";
    if(type==='all') t = `Title: ${inputs.itemName.value}\nPrice: $${inputs.saleUsd.value}\nProfit: ${document.getElementById('profit').textContent}`;
    navigator.clipboard.writeText(t).then(() => showToast("コピーしました！"));
  }

  function saveRecord() {
    if(!inputs.saleUsd.value) return showToast('売値を入力してください');
    const pText = document.getElementById('profit').textContent;
    const pVal = parseInt(pText.replace(/[¥,]/g, '').replace('-', '')) * (pText.includes('-')?-1:1);
    const record = { id: Date.now(), name: inputs.itemName.value || '無題', sale: inputs.saleUsd.value, profit: pVal, date: new Date().toLocaleDateString() };
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data.unshift(record);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    showToast('保存しました！');
  }

  function updateReport() {
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    const goal = parseInt(localStorage.getItem('cfg_goal') || 100000);
    let total = 0;
    const listEl = document.getElementById('historyList');
    const rankEl = document.getElementById('rankingList');
    listEl.innerHTML = ''; rankEl.innerHTML = '';

    data.forEach(item => {
      total += item.profit;
      const div = document.createElement('div');
      div.className = 'hist-card';
      div.innerHTML = `<div><b>${item.name}</b><br><small>$${item.sale}</small></div>
                       <div style="display:flex; align-items:center;"><b style="color:${item.profit>=0?'var(--green)':'var(--red)'}">¥${item.profit.toLocaleString()}</b>
                       <button class="hist-del" onclick="deleteItem(${item.id})">×</button></div>`;
      listEl.appendChild(div);
    });

    // 3. ランキング表示
    const sorted = [...data].filter(x => x.profit > 0).sort((a,b)=>b.profit - a.profit).slice(0,3);
    sorted.forEach((item, idx) => {
      const d = document.createElement('div');
      d.className = 'rank-card';
      d.innerHTML = `<div class="rank-num">${idx+1}</div><div class="rank-info"><b>${item.name}</b><small>$${item.sale}</small></div><div class="rank-val">¥${item.profit.toLocaleString()}</div>`;
      rankEl.appendChild(d);
    });

    document.getElementById('monthTotal').textContent = (total >= 0 ? '¥' : '-¥') + Math.abs(total).toLocaleString();
    document.getElementById('goalText').textContent = `目標: ¥${goal.toLocaleString()}`;
    const per = Math.min(100, Math.max(0, (total / goal) * 100));
    document.getElementById('percentText').textContent = Math.round(per) + '%';
    document.getElementById('goalBar').style.width = per + '%';
  }

  function deleteItem(id) {
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data = data.filter(x => x.id !== id);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    updateReport();
  }

  function setGoal() {
    const g = prompt("目標利益（円）を入力:", "100000");
    if(g) { localStorage.setItem('cfg_goal', g); updateReport(); }
  }

  function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  function resetInputs() {
    ids.forEach(id => { if(id!=='rate' && id!=='feePercent') inputs[id].value = ''; });
    calc();
  }

  function clearAllData() { if(confirm('全データを消去しますか？')) { localStorage.removeItem('ebay_pro_data'); updateReport(); } }
</script>
</body>
</html>
