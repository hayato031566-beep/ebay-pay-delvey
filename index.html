<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>eBay Profit Calc - Delvey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Design Theme ── */
    :root {
      --main:    #c0593a;
      --main-h:  #a4472b;
      --main-l:  #f8ece6;
      --accent:  #c0593a;
      --bg:      #f9f7f2;
      --bg2:     #f2ede5;
      --surface: #ffffff;
      --border:  #e8e3db;
      --ink:     #18150f;
      --ink2:    #574e43;
      --ink3:    #9a8e80;
      --green:   #1a9e5c;
      --green-l: #e4f7ee;
      --red:     #d03a3a;
      --red-l:   #fceaea;
      --dollar-bg:  #top-f7f2;
      --dollar-bd:  #b8dece;
      --dollar-txt: #1a7f50;
      --yen-bg:     #fef6ea;
      --yen-bd:     #f0d9b0;
      --yen-txt:    #9a6010;
      --r:    14px;
      --r-sm: 10px;
      --r-xs:  6px;
      --r-lg: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--ink);
      padding: 13px 18px 11px;
      display: flex; align-items: center; gap: 11px;
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 56px;
    }
    .hd-logo {
      width: 32px; height: 32px; background: var(--main);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hd-logo svg { display: block; }
    .hd-text { flex: 1; }
    .hd-name { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.025em; line-height: 1.15; }
    .hd-name span { color: var(--main); }
    .hd-sub  { font-size: 9.5px; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; margin-top: 1px; }
    .hd-rate {
      font-size: 11px; color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 4px 10px;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .hd-dot { width: 5px; height: 5px; border-radius: 50%; background: #2ecc71; }
    .hd-dot.loading { background: #f5a623; animation: blink 1s infinite alternate; }
    @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 18px;
      position: fixed; top: 56px; left: 0; right: 0; z-index: 199;
      height: 45px;
    }
    .tab {
      flex: 1; padding: 10px 0 9px; text-align: center;
      color: rgba(255,255,255,0.35); cursor: pointer;
      font-size: 12.5px; font-weight: 400;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: #fff; border-bottom-color: var(--main); font-weight: 500; }

    /* ── Result Box ── */
    .result-box {
      background: var(--ink); color: #fff;
      border-radius: var(--r-lg); padding: 14px 20px;
      text-align: center;
      position: relative;
      z-index: 10;
      max-width: 872px; margin: 20px auto 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .result-box::after {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 180px; height: 180px; border-radius: 50%;
      background: radial-gradient(circle, rgba(192,89,58,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Layout ── */
    .container { 
      width: 100%; 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 115px 14px 60px;
    }
    .page { display: none; }
    .page.active { display: block; }

    .report-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    @media (min-width: 800px) {
      .report-grid {
        display: grid;
        grid-template-columns: 1fr 320px;
        align-items: start;
      }
      .report-side {
        position: sticky;
        top: 115px;
      }
    }

    /* ── Card ── */
    .card {
      background: var(--surface); border-radius: var(--r-lg);
      border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden;
    }
    h2 {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink3);
      margin: 0; padding: 13px 18px 0;
      display: flex; align-items: center; gap: 7px;
    }
    h2::before { content: ''; width: 3px; height: 12px; background: var(--main); border-radius: 2px; flex-shrink: 0; }

    /* ── Form ── */
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 13px; padding: 12px 18px 18px;
    }
    .field { display: flex; flex-direction: column; margin-bottom: 0; }
    .field.full { grid-column: 1 / 3; }

    label {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.09em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }

    /* ── Inputs ── */
    .iw { display: flex; align-items: stretch; }
    .cb {
      display: flex; align-items: center; justify-content: center;
      min-width: 36px; padding: 0 10px;
      font-size: 15px; font-weight: 700;
      border-radius: var(--r-sm) 0 0 var(--r-sm);
      border: 1px solid; border-right: none;
      flex-shrink: 0; letter-spacing: -0.02em;
    }
    .cb.d { background: var(--dollar-bg); border-color: var(--dollar-bd); color: var(--dollar-txt); }
    .cb.y { background: var(--yen-bg);    border-color: var(--yen-bd);    color: var(--yen-txt); }
    .cb.p { background: var(--bg2);        border-color: var(--border);    color: var(--ink3); font-size: 13px; }

    input {
      padding: 11px 12px;
      border: 1px solid #e5e5e5; border-radius: var(--r-sm);
      font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 400;
      color: var(--ink); background: var(--bg); width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      -webkit-appearance: none; min-height: 44px;
    }
    .iw input {
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      border-left: none; flex: 1;
    }
    input::placeholder { color: var(--ink3); opacity: 0.5; font-size: 13px; }
    input:focus {
      border-color: var(--main); background: var(--surface);
      box-shadow: 0 0 0 3px rgba(192,89,58,0.10);
    }
    .iw:focus-within .cb { border-color: var(--main); }

    /* ── Quick Buttons ── */
    .quick-group { display: flex; gap: 7px; margin-top: 8px; }
    .q-btn {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      padding: 10px 4px; border-radius: var(--r-sm);
      font-size: 11.5px; font-weight: 600; color: var(--ink2);
      cursor: pointer; font-family: 'Inter', sans-serif; line-height: 1.3;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      min-height: 44px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
    }
    .q-btn:hover  { background: var(--main-l); border-color: rgba(192,89,58,0.35); color: var(--main-h); }
    .q-btn:active { transform: scale(0.97); }
    .q-btn small  { font-size: 9px; font-weight: 400; opacity: 0.6; }

    /* ── Back-calc ── */
    .btn-toggle {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: calc(100% - 36px); margin: 0 18px 14px;
      padding: 11px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      font-size: 12px; font-weight: 500; color: var(--ink2);
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.15s; min-height: 44px;
    }
    #backCalcPanel {
      display: none; background: var(--main-l);
      border: 1px solid rgba(192,89,58,0.20);
      padding: 15px 18px; border-radius: var(--r-sm);
      margin: 0 18px 14px;
    }
    #backCalcPanel button {
      background: var(--main); color: #fff; border: none;
      border-radius: var(--r-sm) ; padding: 0 18px;
      font-size: 13px; font-weight: 500; cursor: pointer; min-height: 44px;
    }

    .res-row {
      display: flex; justify-content: space-between;
      font-size: 10.5px; font-weight: 300; color: rgba(255,255,255,0.38);
      margin-bottom: 2px;
    }
    #profit {
      font-size: 48px; font-weight: 300; letter-spacing: -0.05em;
      line-height: 1; margin: 2px 0 4px;
    }
    .profit-rate-row { font-size: 11px; color: rgba(255,255,255,0.35); }

    /* Copy Buttons */
    .copy-god-row {
      display: flex; gap: 8px; margin-top: 12px;
      position: relative; z-index: 10;
    }
    .copy-god-row button {
      flex: 1; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); color: #fff;
      border-radius: 8px; padding: 8px 4px; font-size: 10px; font-weight: 500;
      cursor: pointer; transition: 0.2s; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px; font-family: 'Inter', sans-serif;
    }
    .copy-god-row button span { font-size: 13px; }
    .copy-god-row button.copied { background: rgba(46,204,113,0.2); border-color: #2ecc71; color: #2ecc71; }

    /* Save / Reset */
    .btn-save {
      width: 100%; padding: 15px; background: var(--main); color: #fff; border: none;
      border-radius: var(--r-sm); font-weight: 600; font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-reset {
      width: 100%; background: none; border: none; color: var(--ink3);
      text-decoration: none; margin-top: 12px; font-size: 11.5px;
      cursor: pointer; display: block; text-align: center; opacity: 0.65;
    }

    /* Report & Toast */
    .report-hero { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 20px; margin-bottom: 10px; position: relative; overflow: hidden; }
    #monthTotal { font-size: 44px; font-weight: 300; letter-spacing: -0.04em; color: #fff; text-align: center; cursor: pointer; margin: 4px 0 12px; }
    .goal-meta { display: flex; justify-content: space-between; font-size: 10.5px; font-weight: 300; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
    .bar-bg { background: rgba(255,255,255,0.10); height: 10px; border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; border-radius: 6px; background: linear-gradient(90deg, #e8593c 0%, #f5a623 60%, #2ecc71 100%); transition: width 0.7s ease; }
    
    .sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0 0; }
    .sum-item { background: var(--surface); padding: 14px 12px; border-radius: var(--r); text-align: center; cursor: pointer; border: 1.5px solid var(--border); }
    .sum-item.active-filter { border-color: var(--main); background: var(--main-l); }
    .sum-item div { font-size: 9px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; margin-bottom: 5px; }
    .sum-item b { font-size: 28px; font-weight: 300; display: block; }
    
    .hist-card { background: var(--surface); padding: 12px 14px; border-radius: var(--r-sm); margin-bottom: 6px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .hist-del { color: var(--red); background: none; border: none; font-size: 18px; padding: 4px 7px; cursor: pointer; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; display: none; z-index: 1000; }

    /* Ranking */
    .rank-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
    .rank-tab-mini { flex: 1; font-size: 10px; padding: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; text-align: center; }
    .rank-tab-mini.active { background: var(--main); color: #fff; border-color: var(--main); }
    .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--border); }
    .rank-badge { width: 22px; height: 22px; border-radius: 50%; background: var(--bg2); color: var(--ink3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; margin-right: 10px; }
    .rank-info { flex: 1; font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-profit b { font-size: 14px; color: var(--green); display: block; }
    .rank-profit small { font-size: 9px; color: var(--ink3); }

    /* Share Button Styles */
    .btn-share-x {
      width: 100%; padding: 12px; background: #000; color: #fff; border: none;
      border-radius: var(--r-sm); font-weight: 600; font-size: 13px;
      margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    @media (max-width: 360px) { #profit { font-size: 38px; } #monthTotal{ font-size: 36px; } }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <div class="hd-logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
  </div>
  <div class="hd-text">
    <div class="hd-name">eBay Profit <span>Delvey!</span></div>
    <div class="hd-sub">eBay Export Profit Calculator</div>
  </div>
  <div class="hd-rate" id="rateBadge"><div class="hd-dot" id="rateDot"></div><span id="rateDisplay">Loading...</span></div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-calc" onclick="switchTab('calcPage')">Calculator</div>
  <div class="tab" id="tab-report" onclick="switchTab('reportPage')">Reports</div>
</div>

<div class="container">

  <div id="calcPage" class="page active">
    
    <div class="card">
      <h2>Item Note</h2>
      <div class="form-grid" style="padding-top:10px;">
        <div class="field full">
          <input type="text" id="itemName" placeholder="e.g. Game Console / Anime Figure">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Transaction Details</h2>
      <div class="form-grid">
        <div class="field">
          <label>Exchange Rate</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="rate" value="150" placeholder="150"></div>
        </div>
        <div class="field">
          <label>eBay Fee (%)</label>
          <div class="iw"><div class="cb p">%</div><input type="number" id="feePercent" value="15" placeholder="15"></div>
        </div>
        <div class="field">
          <label>Sale Price ($)</label>
          <div class="iw"><div class="cb d">$</div><input type="number" id="saleUsd" placeholder="e.g. 120.00"></div>
        </div>
        <div class="field">
          <label>Purchase Cost (¥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="cost" placeholder="e.g. 5,000"></div>
        </div>
        <div class="field">
          <label>Shipping (¥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="shipping" placeholder="e.g. 3,000"></div>
          <div class="quick-group">
            <button class="q-btn" onclick="setShipping(3000)">✈ FedEx<small>¥3k</small></button>
            <button class="q-btn" onclick="setShipping(5000)">📦 EMS<small>¥5k</small></button>
          </div>
        </div>
        <div class="field">
          <label>Misc Expenses (¥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="other" value="0"></div>
        </div>
      </div>
    </div>

    <div class="result-box">
      <div class="res-row">
        <span>Sales <span id="salesJpy">¥0</span></span>
        <span>Fees <span id="feeJpy">¥0</span></span>
      </div>
      <div id="profit">¥0</div>
      <div class="profit-rate-row">Profit Margin <span id="profitRate">0.0%</span></div>
      <div class="copy-god-row">
        <button onclick="godCopy('title', this)"><span>📝</span>Title</button>
        <button onclick="godCopy('price', this)"><span>💲</span>Price($)</button>
        <button onclick="godCopy('desc', this)"><span>✨</span>Template</button>
        <button onclick="godCopy('memo', this)"><span>📊</span>Profit Memo</button>
      </div>
    </div>

    <button class="btn-toggle" onclick="toggleBackCalc()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a6 6 0 010 12h-1"/></svg>
      Reverse Calc: Target Selling Price
    </button>
    <div id="backCalcPanel">
      <label>Target Profit (¥)</label>
      <div style="display:flex; gap:8px; margin-top:5px;">
        <input type="number" id="targetProfit" value="3000">
        <button onclick="calcBack()">Calculate</button>
      </div>
    </div>

    <div style="margin-top: 20px; padding-bottom: 40px;">
      <button class="btn-save" onclick="saveRecord()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        Save this Record
      </button>
      <button class="btn-reset" onclick="resetInputs()">Reset Inputs</button>
    </div>
  </div>

  <div id="reportPage" class="page">
    <div class="report-grid">
      <div class="report-main">
        <div class="report-hero">
          <h2 style="display:flex; justify-content:space-between; align-items:center;">
            📈 Monthly Progress
            <button class="q-btn" style="min-height:unset; padding:4px 10px;" onclick="setGoal()">Set Goal</button>
          </h2>
          <div class="goal-meta">
            <span id="goalText">Goal: ¥100,000</span>
            <span id="percentText">0%</span>
          </div>
          <div class="bar-bg"><div id="goalBar" class="bar-fill"></div></div>
          <div id="monthTotal" onclick="updateReport('all')">¥0</div>
          <div style="font-size:9px; text-align:center; color:rgba(255,255,255,0.25); margin-top:-8px;">Tap to show all records</div>

          <button class="btn-share-x" onclick="shareOnX()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Xでシェアする
          </button>
        </div>
        
        <div class="card" style="padding:14px 16px;">
          <div class="sum-grid">
            <div class="sum-item" id="filter-plus" onclick="updateReport('plus')">
              <div style="color:var(--green);">Profitable</div>
              <b id="plusCount" style="color:var(--green);">0</b>
            </div>
            <div class="sum-item" id="filter-minus" onclick="updateReport('minus')">
              <div style="color:var(--red);">Deficit</div>
              <b id="minusCount" style="color:var(--red);">0</b>
            </div>
          </div>
        </div>
        
        <div id="historyList"></div>
      </div>

      <div class="report-side">
        <div class="card" style="padding:14px 16px;">
          <h2 style="padding: 0 0 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px;">
            👑 Top Performance
          </h2>
          <div class="rank-tabs">
            <div class="rank-tab-mini active" id="rt-profit" onclick="setRankMode('profit')">By Amount</div>
            <div class="rank-tab-mini" id="rt-rate" onclick="setRankMode('rate')">By Margin</div>
          </div>
          <div id="rankingList"></div>
        </div>
      </div>
    </div>
    <button class="btn-reset" style="color:var(--red); width:100%; opacity:0.5;" onclick="clearAllData()">Clear All Data</button>
  </div>
</div>

<script>
  const ids = ['itemName', 'rate', 'feePercent', 'saleUsd', 'cost', 'shipping', 'other'];
  const inputs = {};
  ids.forEach(id => inputs[id] = document.getElementById(id));

  let currentRankMode = 'profit';
  let currentFilter = 'all'; 

  // --- ICL Function ---
  const fmt = (val, cur = 'JPY') => {
    return new Intl.NumberFormat(navigator.language, {
      style: 'currency',
      currency: cur,
      maximumFractionDigits: cur === 'JPY' ? 0 : 2
    }).format(val);
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  function setRankMode(mode) {
    currentRankMode = mode;
    document.querySelectorAll('.rank-tab-mini').forEach(t => t.classList.remove('active'));
    document.getElementById('rt-' + mode).classList.add('active');
    updateReport(currentFilter);
  }

  async function fetchExchangeRate() {
    const dot = document.getElementById('rateDot');
    const display = document.getElementById('rateDisplay');
    dot.classList.add('loading');
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      if(data && data.rates && data.rates.JPY) {
        const currentRate = Math.floor(data.rates.JPY);
        inputs.rate.value = currentRate;
        display.textContent = `${fmt(currentRate)}/$`;
        calc();
        showToast(`Rate updated: ${fmt(currentRate)}`);
      }
    } catch(e) {
      display.textContent = `${fmt(inputs.rate.value)}/$ (Manual)`;
    } finally {
      dot.classList.remove('loading');
    }
  }

  window.onload = () => {
    inputs.rate.value = localStorage.getItem('cfg_rate') || 150;
    inputs.feePercent.value = localStorage.getItem('cfg_fee') || 15;
    calc();
    updateReport('all');
    fetchExchangeRate();
  };

  function godCopy(type, btn) {
    const title = inputs.itemName.value || '';
    const price = inputs.saleUsd.value || '';
    const cost = inputs.cost.value || 0;
    const profit = document.getElementById('profit').innerText;
    let textToCopy = '';
    
    if (type === 'title') {
      textToCopy = title;
      if(!textToCopy) return showToast('Title is empty');
    } else if (type === 'price') {
      textToCopy = price;
      if(!textToCopy) return showToast('Price is empty');
    } else if (type === 'desc') {
      if(!title) return showToast('Title is empty');
      textToCopy = `【${title}】\n\nCondition: Used - Excellent\nThank you for visiting! Please feel free to ask any questions.`;
    } else if (type === 'memo') {
      textToCopy = `【${title || 'Untitled'}】\nPrice: ${fmt(price || 0, 'USD')}\nCost: ${fmt(cost)}\nProfit: ${profit}`;
    }

    navigator.clipboard.writeText(textToCopy).then(() => {
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<span>✔</span>Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = originalHTML;
        btn.classList.remove('copied');
      }, 1500);
    });
  }

  function switchTab(pId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pId).classList.add('active');
    document.getElementById(pId === 'calcPage' ? 'tab-calc' : 'tab-report').classList.add('active');
    window.scrollTo(0,0);
  }

  function calc() {
    const v = (id) => parseFloat(inputs[id].value) || 0;
    const sJpy = Math.round(v('saleUsd') * v('rate'));
    const fJpy = Math.round(sJpy * (v('feePercent') / 100));
    const profit = sJpy - (v('cost') + v('shipping') + v('other') + fJpy);
    
    document.getElementById('salesJpy').textContent = fmt(sJpy);
    document.getElementById('feeJpy').textContent = fmt(fJpy);
    
    const pEl = document.getElementById('profit');
    pEl.textContent = fmt(profit);
    pEl.style.color = profit >= 0 ? '#2ecc71' : '#ff6b6b';
    
    const pRate = sJpy > 0 ? (profit / sJpy) * 100 : 0;
    document.getElementById('profitRate').textContent = pRate.toFixed(1) + '%';
  }
  
  ids.forEach(id => inputs[id].addEventListener('input', calc));

  function setShipping(val) { inputs.shipping.value = val; calc(); }
  function toggleBackCalc() {
    const p = document.getElementById('backCalcPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
  }

  function calcBack() {
    const rate = parseFloat(inputs.rate.value) || 150;
    const feeP = parseFloat(inputs.feePercent.value) || 15;
    const costTotal = (parseFloat(inputs.cost.value)||0) + (parseFloat(inputs.shipping.value)||0) + (parseFloat(inputs.other.value)||0);
    const target = parseFloat(document.getElementById('targetProfit').value) || 0;
    
    const requiredJpy = (target + costTotal) / (1 - (feeP / 100));
    const requiredUsd = requiredJpy / rate;
    
    inputs.saleUsd.value = requiredUsd.toFixed(2);
    calc();
    showToast(`Price set to ${fmt(requiredUsd, 'USD')}`);
  }

  function saveRecord() {
    if(!inputs.saleUsd.value) return showToast('Please enter sale price');
    const v = (id) => parseFloat(inputs[id].value) || 0;
    const sJpy = Math.round(v('saleUsd') * v('rate'));
    const fJpy = Math.round(sJpy * (v('feePercent') / 100));
    const profitVal = sJpy - (v('cost') + v('shipping') + v('other') + fJpy);
    
    const pRate = sJpy > 0 ? (profitVal / sJpy) * 100 : 0;

    const rec = { 
      id: Date.now(), 
      name: inputs.itemName.value || 'Untitled', 
      sale: inputs.saleUsd.value, 
      profit: profitVal,
      rate: pRate.toFixed(1)
    };

    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data.unshift(rec);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    showToast('Record Saved!');
    updateReport(currentFilter); 
  }

  function updateReport(filter = currentFilter) {
    currentFilter = filter; 
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    const goal = parseInt(localStorage.getItem('cfg_goal') || 100000);
    let total = 0, plus = 0, minus = 0;
    const list = document.getElementById('historyList');
    list.innerHTML = '';

    document.getElementById('filter-plus').classList.remove('active-filter');
    document.getElementById('filter-minus').classList.remove('active-filter');
    if(currentFilter === 'plus') document.getElementById('filter-plus').classList.add('active-filter');
    if(currentFilter === 'minus') document.getElementById('filter-minus').classList.add('active-filter');

    const rankList = document.getElementById('rankingList');
    if (rankList) {
      rankList.innerHTML = '';
      const sortedData = [...data].filter(i => i.profit > 0).sort((a,b) => {
        if (currentRankMode === 'profit') return b.profit - a.profit;
        return (parseFloat(b.rate) || 0) - (parseFloat(a.rate) || 0);
      }).slice(0, 5);
      
      if(sortedData.length === 0) {
        rankList.innerHTML = '<div style="text-align:center; font-size:11px; color:var(--ink3); padding:10px 0;">No data yet</div>';
      } else {
        sortedData.forEach((item, index) => {
          rankList.innerHTML += `
            <div class="rank-item">
              <div class="rank-badge">${index+1}</div>
              <div class="rank-info">${item.name}</div>
              <div class="rank-profit">
                <b>${currentRankMode === 'profit' ? fmt(item.profit) : item.rate + '%'}</b>
              </div>
            </div>
          `;
        });
      }
    }

    data.forEach(item => {
      total += item.profit;
      if(item.profit >= 0) plus++; else minus++;
      
      let shouldShow = false;
      if(currentFilter === 'all') shouldShow = true;
      else if(currentFilter === 'plus' && item.profit >= 0) shouldShow = true;
      else if(currentFilter === 'minus' && item.profit < 0) shouldShow = true;

      if(shouldShow) {
        const d = document.createElement('div');
        d.className = 'hist-card';
        d.innerHTML = `<div><b>${item.name}</b><br><small>${fmt(item.sale, 'USD')}</small></div>
                       <div style="display:flex;align-items:center;"><b style="color:${item.profit>=0?'var(--green)':'var(--red)'}">${fmt(item.profit)}</b>
                       <button class="hist-del" onclick="deleteItem(${item.id})">×</button></div>`;
        list.appendChild(d);
      }
    });

    document.getElementById('monthTotal').textContent = fmt(total);
    document.getElementById('monthTotal').style.color = total >= 0 ? '#fff' : 'var(--red)';
    document.getElementById('plusCount').textContent = plus;
    document.getElementById('minusCount').textContent = minus;
    document.getElementById('goalText').textContent = `Goal: ${fmt(goal)}`;
    const p = Math.min(100, Math.max(0, (total/goal)*100));
    document.getElementById('goalBar').style.width = p + '%';
    document.getElementById('percentText').textContent = p.toFixed(1) + '%';
  }

  function shareOnX() {
    const totalProfit = document.getElementById('monthTotal').textContent;
    const text = encodeURIComponent(`今月のeBay利益は ${totalProfit}！ #デルベイ`);
    const url = `https://twitter.com/intent/tweet?text=${text}`;
    window.open(url, '_blank');
  }

  function deleteItem(id) {
    if(!confirm('Delete this record?')) return;
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data = data.filter(i => i.id !== id);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    updateReport(currentFilter); 
  }

  function resetInputs() {
    inputs.saleUsd.value = '';
    inputs.cost.value = '';
    inputs.shipping.value = '';
    inputs.itemName.value = '';
    calc();
    showToast('Inputs reset');
  }

  function setGoal() {
    const g = prompt("Set monthly profit goal (JPY):", "100000");
    if(g) {
      localStorage.setItem('cfg_goal', g);
      updateReport(currentFilter);
    }
  }

  function clearAllData() {
    if(confirm("Are you sure you want to delete all saved records?")) {
      localStorage.removeItem('ebay_pro_data');
      updateReport('all');
    }
  }
</script>
</body>
</html>
