<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>eBay利益で、デルベイ！最強完全体</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* 送っていただいたデザイン変数をそのまま継承 */
    :root {
      --main:    #c0593a;
      --main-h:  #a4472b;
      --main-l:  #f8ece6;
      --accent:  #c0593a;
      --bg:      #f9f7f2;
      --bg2:     #f2ede5;
      --surface: #ffffff;
      --border:  #e8e3db;
      --ink:     #18150f;
      --ink2:    #574e43;
      --ink3:    #9a8e80;
      --green:   #1a9e5c;
      --green-l: #e4f7ee;
      --red:     #d03a3a;
      --red-l:   #fceaea;
      --dollar-bg:  #edf7f2;
      --dollar-bd:  #b8dece;
      --dollar-txt: #1a7f50;
      --yen-bg:     #fef6ea;
      --yen-bd:     #f0d9b0;
      --yen-txt:    #9a6010;
      --r:    14px;
      --r-sm: 10px;
      --r-xs:  6px;
      --r-lg: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); }

    /* ── Header ── */
    .header { background: var(--ink); padding: 13px 18px 11px; display: flex; align-items: center; gap: 11px; position: sticky; top: 0; z-index: 100; }
    .hd-logo { width: 32px; height: 32px; background: var(--main); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .hd-name { font-size: 15px; font-weight: 600; color: #fff; }
    .hd-name span { color: var(--main); }
    .hd-rate { font-size: 11px; color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 10px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .hd-dot { width: 5px; height: 5px; border-radius: 50%; background: #2ecc71; }
    .hd-dot.syncing { background: #f1c40f; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

    /* ── Tabs ── */
    .tabs { display: flex; background: var(--ink); border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 18px; }
    .tab { flex: 1; padding: 10px 0 9px; text-align: center; color: rgba(255,255,255,0.35); cursor: pointer; font-size: 12.5px; border-bottom: 2px solid transparent; }
    .tab.active { color: #fff; border-bottom-color: var(--main); font-weight: 500; }

    .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 18px 14px 60px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── Card & Forms ── */
    .card { background: var(--surface); border-radius: var(--r-lg); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
    h2 { font-size: 10px; font-weight: 700; color: var(--ink3); padding: 13px 18px 0; display: flex; align-items: center; gap: 7px; text-transform: uppercase; }
    h2::before { content: ''; width: 3px; height: 12px; background: var(--main); border-radius: 2px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; padding: 12px 18px 18px; }
    .field.full { grid-column: 1 / 3; }
    label { font-size: 9.5px; font-weight: 600; color: var(--ink3); margin-bottom: 6px; display: block; }
    
    .iw { display: flex; align-items: stretch; }
    .cb { display: flex; align-items: center; justify-content: center; min-width: 36px; padding: 0 10px; font-size: 15px; font-weight: 700; border-radius: var(--r-sm) 0 0 var(--r-sm); border: 1px solid; border-right: none; }
    .cb.d { background: var(--dollar-bg); border-color: var(--dollar-bd); color: var(--dollar-txt); }
    .cb.y { background: var(--yen-bg); border-color: var(--yen-bd); color: var(--yen-txt); }
    .cb.p { background: var(--bg2); border-color: var(--border); color: var(--ink3); font-size: 13px; }

    input { padding: 11px 12px; border: 1px solid #e5e5e5; border-radius: var(--r-sm); font-size: 15px; background: var(--bg); width: 100%; min-height: 44px; }
    .iw input { border-radius: 0 var(--r-sm) var(--r-sm) 0; border-left: none; }
    input:focus { border-color: var(--main); background: var(--surface); box-shadow: 0 0 0 3px rgba(192,89,58,0.1); }

    .q-btn { flex: 1; background: var(--bg2); border: 1px solid var(--border); padding: 10px 4px; border-radius: var(--r-sm); font-size: 11.5px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn-toggle { width: calc(100% - 36px); margin: 0 18px 14px; padding: 11px; background: var(--bg2); border: 1px dashed var(--border); border-radius: var(--r-sm); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }

    /* ── Result Box ── */
    .result-box { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 20px; text-align: center; margin-top: 4px; position: relative; }
    #profit { font-size: 56px; font-weight: 300; margin: 4px 0; transition: color 0.3s; }
    .res-row { display: flex; justify-content: space-between; font-size: 10.5px; color: rgba(255,255,255,0.3); margin-bottom: 6px; }
    
    /* ★神コピーボタンエリア */
    .copy-group { display: flex; gap: 8px; justify-content: center; margin-top: 15px; }
    .btn-cp { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.2s; }
    .btn-cp:active { background: var(--main); border-color: var(--main); }

    .btn-save { width: 100%; padding: 15px; background: var(--main); color: #fff; border: none; border-radius: var(--r-sm); font-weight: 600; font-size: 15px; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; }

    /* ── Report & Ranking ── */
    .report-hero { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 20px; margin-bottom: 10px; text-align: center; }
    .bar-bg { background: rgba(255,255,255,0.1); height: 10px; border-radius: 6px; overflow: hidden; margin: 12px 0; }
    .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #e8593c, #2ecc71); transition: 1s; }
    .rank-card { background: #fff; border: 1px solid var(--border); border-radius: var(--r); padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .rank-no { font-weight: 800; color: var(--main); font-style: italic; width: 25px; }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; display: none; z-index: 1000; box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <div class="hd-logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
  </div>
  <div class="hd-text">
    <div class="hd-name">eBay利益で、<span>デルベイ！</span></div>
  </div>
  <div class="hd-rate" id="rateBtn" onclick="fetchRate()">
    <div class="hd-dot" id="rateDot"></div>
    <span id="rateDisplay">¥150.00/$</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-calc" onclick="switchTab('calcPage')">利益計算</div>
  <div class="tab" id="tab-report" onclick="switchTab('reportPage')">集計レポート</div>
</div>

<div class="container">
  <div id="calcPage" class="page active">
    <div class="card">
      <h2>あ（商品名）</h2>
      <div class="form-grid" style="padding-top:10px;">
        <div class="field full"><input type="text" id="itemName" placeholder="eBayに出品する商品名"></div>
      </div>
    </div>

    <div class="card">
      <h2>取引情報を入力</h2>
      <div class="form-grid">
        <div class="field"><label>為替レート</label><div class="iw"><div class="cb y">¥</div><input type="number" id="rate" value="150"></div></div>
        <div class="field"><label>手数料(%)</label><div class="iw"><div class="cb p">%</div><input type="number" id="feePercent" value="15"></div></div>
        <div class="field"><label>い（売値 $）</label><div class="iw"><div class="cb d">$</div><input type="number" id="saleUsd" placeholder="0.00"></div></div>
        <div class="field"><label>う（仕入れ ¥）</label><div class="iw"><div class="cb y">¥</div><input type="number" id="cost" placeholder="0"></div></div>
        <div class="field"><label>え（送料 ¥）</label><div class="iw"><div class="cb y">¥</div><input type="number" id="shipping" placeholder="0"></div></div>
        <div class="field"><label>経費 (¥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="other" value="0"></div></div>
      </div>
      <div class="quick-group" style="padding:0 18px 15px;">
        <button class="q-btn" onclick="setShipping(3000)">✈ FedEx<small>¥3,000</small></button>
        <button class="q-btn" onclick="setShipping(5000)">📦 EMS<small>¥5,000</small></button>
      </div>
      <button class="btn-toggle" onclick="toggleBack()">🔄 目標利益から「い」を逆算</button>
      <div id="backCalcPanel" style="display:none; padding:0 18px 18px;">
        <label>欲しい純利益 (円)</label>
        <div style="display:flex; gap:8px;"><input type="number" id="targetProfit" value="3000"><button onclick="calcBack()" style="background:var(--main); color:#fff; border:none; border-radius:8px; padding:0 15px;">計算</button></div>
      </div>
    </div>

    <div class="result-box">
      <div class="res-row"><span>売上 <span id="salesJpy">¥0</span></span><span>手数料 <span id="feeJpy">¥0</span></span></div>
      <div id="profit">¥0</div>
      <div style="font-size:11px; opacity:0.4;">見込み利益率 <span id="profitRate">0.0%</span></div>
      
      <div class="copy-group">
        <button class="btn-cp" onclick="cp('a')">あ（名）</button>
        <button class="btn-cp" onclick="cp('i')">い（$）</button>
        <button class="btn-cp" onclick="cp('all')">全コピー</button>
      </div>
    </div>

    <button class="btn-save" onclick="saveRecord()">利益を記録する</button>
    <button class="btn-reset" onclick="resetInputs()" style="width:100%; background:none; border:none; color:var(--ink3); font-size:11px; margin-top:15px; cursor:pointer;">入力をリセット</button>
  </div>

  <div id="reportPage" class="page">
    <div class="report-hero">
      <div style="display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.4);">
        <span id="goalText">目標: ¥100,000</span><span id="percentText">0%</span>
      </div>
      <div class="bar-bg"><div id="goalBar" class="bar-fill"></div></div>
      <div id="monthTotal" style="font-size:44px; font-weight:300;">¥0</div>
      <button onclick="setGoal()" style="background:none; border:1px solid rgba(255,255,255,0.2); color:#fff; font-size:10px; padding:4px 12px; border-radius:20px; cursor:pointer;">目標設定</button>
    </div>

    <h2 style="margin:20px 0 10px;">🏆 利益ランキング (Top3)</h2>
    <div id="rankingList"></div>

    <h2 style="margin:20px 0 10px;">🕒 最近の履歴</h2>
    <div id="historyList"></div>
    <button onclick="clearAllData()" style="width:100%; border:none; background:none; color:var(--red); font-size:11px; margin-top:30px; opacity:0.5;">データを全削除</button>
  </div>
</div>

<script>
  const ids = ['itemName', 'rate', 'feePercent', 'saleUsd', 'cost', 'shipping', 'other'];
  const inputs = {};
  ids.forEach(id => inputs[id] = document.getElementById(id));

  // 1. 為替レート自動取得機能
  async function fetchRate() {
    const dot = document.getElementById('rateDot');
    dot.classList.add('syncing');
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      const newRate = data.rates.JPY.toFixed(2);
      inputs.rate.value = newRate;
      calc();
      showToast(`最新レート ¥${newRate} を取得しました`);
    } catch(e) {
      showToast('レート取得に失敗しました');
    } finally {
      dot.classList.remove('syncing');
    }
  }

  // 2. 利益計算 & 赤字色変え
  function calc() {
    const val = (id) => parseFloat(inputs[id].value) || 0;
    const sJpy = Math.round(val('saleUsd') * val('rate'));
    const fJpy = Math.round(sJpy * (val('feePercent') / 100));
    const profit = sJpy - (val('cost') + val('shipping') + val('other') + fJpy);
    const pRate = sJpy > 0 ? (profit / sJpy) * 100 : 0;

    document.getElementById('salesJpy').textContent = '¥' + sJpy.toLocaleString();
    document.getElementById('feeJpy').textContent = '¥' + fJpy.toLocaleString();
    document.getElementById('rateDisplay').textContent = `¥${val('rate')}/$`;
    
    const pEl = document.getElementById('profit');
    pEl.textContent = (profit >= 0 ? '¥' : '-¥') + Math.abs(profit).toLocaleString();
    pEl.style.color = profit >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('profitRate').textContent = pRate.toFixed(1) + '%';
  }
  ids.forEach(id => inputs[id].addEventListener('input', calc));

  // 3. 神コピーボタン
  function cp(type) {
    let text = "";
    if(type==='a') text = inputs.itemName.value;
    else if(type==='i') text = inputs.saleUsd.value;
    else text = `商品: ${inputs.itemName.value}\n売値: $${inputs.saleUsd.value}\n利益: ${document.getElementById('profit').textContent}`;
    
    if(!text) return showToast('コピーする内容がありません');
    navigator.clipboard.writeText(text).then(() => showToast('コピー完了！ ✔'));
  }

  // その他機能（ランキング・保存・逆算）
  function setShipping(v) { inputs.shipping.value = v; calc(); }
  function toggleBack() { const p = document.getElementById('backCalcPanel'); p.style.display = p.style.display==='none'?'block':'none'; }
  function calcBack() {
    const target = parseFloat(document.getElementById('targetProfit').value) || 0;
    const rate = parseFloat(inputs.rate.value);
    const fee = parseFloat(inputs.feePercent.value) / 100;
    const res = (target + parseFloat(inputs.cost.value||0) + parseFloat(inputs.shipping.value||0) + parseFloat(inputs.other.value||0)) / (rate * (1 - fee));
    inputs.saleUsd.value = Math.ceil(res * 100) / 100;
    calc(); showToast('「い」を自動セットしました');
  }

  function saveRecord() {
    if(!inputs.saleUsd.value) return showToast('売値を入力してください');
    const profitStr = document.getElementById('profit').textContent.replace(/[¥,]/g, '').replace('-', '');
    const isMinus = document.getElementById('profit').textContent.includes('-');
    const record = { id: Date.now(), name: inputs.itemName.value || '無題', sale: inputs.saleUsd.value, profit: parseInt(profitStr) * (isMinus?-1:1) };
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data.unshift(record);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    showToast('記録を保存しました！');
  }

  function updateReport() {
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    const goal = parseInt(localStorage.getItem('cfg_goal') || 100000);
    let sum = 0;
    const histEl = document.getElementById('historyList');
    const rankEl = document.getElementById('rankingList');
    histEl.innerHTML = ''; rankEl.innerHTML = '';

    data.forEach(item => {
      sum += item.profit;
      histEl.innerHTML += `<div class="rank-card"><div><b>${item.name}</b><br><small>$${item.sale}</small></div><b style="color:${item.profit>=0?'var(--green)':'var(--red)'}">¥${item.profit.toLocaleString()}</b></div>`;
    });

    // ランキングTop3
    [...data].sort((a,b) => b.profit - a.profit).slice(0,3).forEach((item, i) => {
      if(item.profit <= 0) return;
      rankEl.innerHTML += `<div class="rank-card"><div class="rank-no">${i+1}</div><div style="flex:1"><b>${item.name}</b></div><b style="color:var(--green)">¥${item.profit.toLocaleString()}</b></div>`;
    });

    document.getElementById('monthTotal').textContent = (sum>=0?'¥':'-¥') + Math.abs(sum).toLocaleString();
    const per = Math.min(100, Math.max(0, (sum/goal)*100));
    document.getElementById('goalBar').style.width = per + '%';
    document.getElementById('percentText').textContent = Math.round(per) + '%';
    document.getElementById('goalText').textContent = `目標: ¥${goal.toLocaleString()}`;
  }

  function switchTab(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById(id==='calcPage'?'tab-calc':'tab-report').classList.add('active');
    if(id==='reportPage') updateReport();
  }

  function setGoal() { const g = prompt("目標利益:", "100000"); if(g) { localStorage.setItem('cfg_goal', g); updateReport(); } }
  function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
  function resetInputs() { inputs.saleUsd.value=''; inputs.cost.value=''; inputs.shipping.value=''; inputs.itemName.value=''; calc(); }
  function clearAllData() { if(confirm("全データを削除しますか？")){ localStorage.removeItem('ebay_pro_data'); updateReport(); } }

  window.onload = () => { fetchRate(); updateReport(); };
</script>
</body>
</html>
