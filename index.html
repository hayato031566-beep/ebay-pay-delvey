<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>eBay Profit Calc - Delvey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Design Theme ── */
    :root {
      --main:    #c0593a;
      --main-h:  #a4472b;
      --main-l:  #f8ece6;
      --accent:  #c0593a;
      --bg:      #f9f7f2;
      --bg2:     #f2ede5;
      --surface: #ffffff;
      --border:  #e8e3db;
      --ink:     #18150f;
      --ink2:    #574e43;
      --ink3:    #9a8e80;
      --green:   #1a9e5c;
      --green-l: #e4f7ee;
      --red:     #d03a3a;
      --red-l:   #fceaea;
      --dollar-bg:  #top-f7f2;
      --dollar-bd:  #b8dece;
      --dollar-txt: #1a7f50;
      --yen-bg:     #fef6ea;
      --yen-bd:     #f0d9b0;
      --yen-txt:    #9a6010;
      --r:    14px;
      --r-sm: 10px;
      --r-xs:  6px;
      --r-lg: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--ink);
      padding: 13px 18px 11px;
      display: flex; align-items: center; gap: 11px;
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 56px;
    }
    .hd-logo {
      width: 32px; height: 32px; background: var(--main);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hd-logo svg { display: block; }
    .hd-text { flex: 1; }
    .hd-name { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.025em; line-height: 1.15; }
    .hd-name span { color: var(--main); }
    .hd-sub  { font-size: 9.5px; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; margin-top: 1px; }
    .hd-rate {
      font-size: 11px; color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 4px 10px;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .hd-dot { width: 5px; height: 5px; border-radius: 50%; background: #2ecc71; }
    .hd-dot.loading { background: #f5a623; animation: blink 1s infinite alternate; }
    @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 18px;
      position: fixed; top: 56px; left: 0; right: 0; z-index: 199;
      height: 45px;
    }
    .tab {
      flex: 1; padding: 10px 0 9px; text-align: center;
      color: rgba(255,255,255,0.35); cursor: pointer;
      font-size: 12.5px; font-weight: 400;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: #fff; border-bottom-color: var(--main); font-weight: 500; }

    /* ── Layout ── */
    .container { 
      width: 100%; 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 115px 14px 60px;
    }
    .page { display: none; }
    .page.active { display: block; }

    /* ── Card ── */
    .card {
      background: var(--surface); border-radius: var(--r-lg);
      border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden;
    }
    h2 {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink3);
      margin: 0; padding: 13px 18px 0;
      display: flex; align-items: center; gap: 7px;
    }
    h2::before { content: ''; width: 3px; height: 12px; background: var(--main); border-radius: 2px; flex-shrink: 0; }

    /* ── Form ── */
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 13px; padding: 12px 18px 18px;
    }
    .field { display: flex; flex-direction: column; margin-bottom: 0; }
    .field.full { grid-column: 1 / 3; }

    label {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.09em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }

    /* ── Inputs ── */
    .iw { display: flex; align-items: stretch; }
    .cb {
      display: flex; align-items: center; justify-content: center;
      min-width: 36px; padding: 0 10px;
      font-size: 15px; font-weight: 700;
      border-radius: var(--r-sm) 0 0 var(--r-sm);
      border: 1px solid; border-right: none;
      flex-shrink: 0; letter-spacing: -0.02em;
    }
    .cb.d { background: var(--dollar-bg); border-color: var(--dollar-bd); color: var(--dollar-txt); }
    .cb.y { background: var(--yen-bg);    border-color: var(--yen-bd);    color: var(--yen-txt); }
    .cb.p { background: var(--bg2);        border-color: var(--border);    color: var(--ink3); font-size: 13px; }

    input {
      padding: 11px 12px;
      border: 1px solid #e5e5e5; border-radius: var(--r-sm);
      font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 400;
      color: var(--ink); background: var(--bg); width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      -webkit-appearance: none; min-height: 44px;
    }
    .iw input {
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      border-left: none; flex: 1;
    }
    input::placeholder { color: var(--ink3); opacity: 0.5; font-size: 13px; }
    input:focus {
      border-color: var(--main); background: var(--surface);
      box-shadow: 0 0 0 3px rgba(192,89,58,0.10);
    }

    /* ── Result Box (Moved Down) ── */
    .result-box {
      background: var(--ink); color: #fff;
      border-radius: var(--r-lg); padding: 14px 20px;
      text-align: center; margin: 20px 0 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      position: relative; overflow: hidden;
    }
    .res-row {
      display: flex; justify-content: space-between;
      font-size: 10.5px; font-weight: 300; color: rgba(255,255,255,0.38);
      margin-bottom: 2px;
    }
    #profit {
      font-size: 48px; font-weight: 300; letter-spacing: -0.05em;
      line-height: 1; margin: 2px 0 4px;
    }
    .profit-rate-row { font-size: 11px; color: rgba(255,255,255,0.35); }

    /* ── Quick Buttons ── */
    .quick-group { display: flex; gap: 7px; margin-top: 8px; }
    .q-btn {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      padding: 10px 4px; border-radius: var(--r-sm);
      font-size: 11.5px; font-weight: 600; color: var(--ink2);
      cursor: pointer; min-height: 44px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* ── Reverse Calc ── */
    .btn-toggle {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; margin-bottom: 14px;
      padding: 11px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      font-size: 12px; font-weight: 500; color: var(--ink2);
      cursor: pointer; min-height: 44px;
    }
    #backCalcPanel {
      display: none; background: var(--main-l);
      border: 1px solid rgba(192,89,58,0.20);
      padding: 15px 18px; border-radius: var(--r-sm);
      margin-bottom: 14px;
    }

    /* Copy Buttons */
    .copy-god-row {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .copy-god-row button {
      flex: 1; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); color: #fff;
      border-radius: 8px; padding: 8px 4px; font-size: 10px; font-weight: 500;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* Save / Reset */
    .btn-save {
      width: 100%; padding: 15px; background: var(--main); color: #fff; border: none;
      border-radius: var(--r-sm); font-weight: 600; font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-reset {
      width: 100%; background: none; border: none; color: var(--ink3);
      margin-top: 12px; font-size: 11.5px; cursor: pointer; display: block; text-align: center; opacity: 0.65;
    }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; display: none; z-index: 1000; }
    
    /* Reports */
    .report-hero { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 20px; margin-bottom: 10px; text-align: center; }
    #monthTotal { font-size: 44px; font-weight: 300; margin-bottom: 10px; }
    .bar-bg { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; }
    .bar-fill { height: 100%; background: var(--main); border-radius: 4px; width: 0%; transition: 0.5s; }
    .hist-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

    @media (max-width: 360px) { #profit { font-size: 38px; } }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <div class="hd-logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
  </div>
  <div class="hd-text">
    <div class="hd-name">eBay Profit <span>Delvey!</span></div>
    <div class="hd-sub">eBay Export Profit Calculator</div>
  </div>
  <div class="hd-rate" id="rateBadge"><div class="hd-dot" id="rateDot"></div><span id="rateDisplay">Loading...</span></div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-calc" onclick="switchTab('calcPage')">Calculator</div>
  <div class="tab" id="tab-report" onclick="switchTab('reportPage')">Reports</div>
</div>

<div class="container">

  <div id="calcPage" class="page active">
    
    <div class="card">
      <h2>Item Note</h2>
      <div class="form-grid" style="padding-top:10px;">
        <div class="field full">
          <input type="text" id="itemName" placeholder="e.g. Game Console / Anime Figure">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Transaction Details</h2>
      <div class="form-grid">
        <div class="field">
          <label>Exchange Rate</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="rate" value="150"></div>
        </div>
        <div class="field">
          <label>eBay Fee (%)</label>
          <div class="iw"><div class="cb p">%</div><input type="number" id="feePercent" value="15"></div>
        </div>
        <div class="field">
          <label>Sale Price ($)</label>
          <div class="iw"><div class="cb d">$</div><input type="number" id="saleUsd" placeholder="0.00"></div>
        </div>
        <div class="field">
          <label>Purchase Cost (¥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="cost" placeholder="0"></div>
        </div>
        <div class="field">
          <label>Shipping (¥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="shipping" placeholder="0"></div>
          <div class="quick-group">
            <button class="q-btn" onclick="setShipping(3000)">✈ FedEx<small>¥3k</small></button>
            <button class="q-btn" onclick="setShipping(5000)">📦 EMS<small>¥5k</small></button>
          </div>
        </div>
        <div class="field">
          <label>Misc (¥)</label>
          <div class="iw"><div class="cb y">¥</div><input type="number" id="other" value="0"></div>
        </div>
      </div>
    </div>

    <div class="result-box">
      <div class="res-row">
        <span>Sales <span id="salesJpy">¥0</span></span>
        <span>Fees <span id="feeJpy">¥0</span></span>
      </div>
      <div id="profit">¥0</div>
      <div class="profit-rate-row">Profit Margin <span id="profitRate">0.0%</span></div>
      
      <div class="copy-god-row">
        <button onclick="godCopy('title', this)"><span>📝</span>Title</button>
        <button onclick="godCopy('price', this)"><span>💲</span>Price($)</button>
        <button onclick="godCopy('desc', this)"><span>✨</span>Template</button>
        <button onclick="godCopy('memo', this)"><span>📊</span>Profit Memo</button>
      </div>
    </div>

    <button class="btn-toggle" onclick="toggleBackCalc()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a6 6 0 010 12h-1"/></svg>
      Reverse Calc: Target Selling Price
    </button>
    <div id="backCalcPanel">
      <label>Target Profit (¥)</label>
      <div style="display:flex; gap:8px; margin-top:5px;">
        <input type="number" id="targetProfit" value="3000">
        <button onclick="calcBack()" style="background:var(--main); color:#fff; border:none; border-radius:8px; padding:0 15px;">Calc</button>
      </div>
    </div>

    <div style="margin-top: 10px; padding-bottom: 40px;">
      <button class="btn-save" onclick="saveRecord()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        Save this Record
      </button>
      <button class="btn-reset" onclick="resetInputs()">Reset Inputs</button>
    </div>

  </div>

  <div id="reportPage" class="page">
    <div class="report-hero">
      <h2>Monthly Profit</h2>
      <div id="monthTotal">¥0</div>
      <div class="bar-bg"><div id="goalBar" class="bar-fill"></div></div>
    </div>
    <div id="historyList"></div>
    <button class="btn-reset" style="color:var(--red); width:100%; opacity:0.5; margin-top:30px;" onclick="clearAllData()">Clear All Data</button>
  </div>
</div>

<script>
  const ids = ['itemName', 'rate', 'feePercent', 'saleUsd', 'cost', 'shipping', 'other'];
  const inputs = {};
  ids.forEach(id => inputs[id] = document.getElementById(id));

  const fmt = (val, cur = 'JPY') => new Intl.NumberFormat('ja-JP', { style: 'currency', currency: cur, maximumFractionDigits: cur === 'JPY' ? 0 : 2 }).format(val);

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  function calc() {
    const v = (id) => parseFloat(inputs[id].value) || 0;
    const sJpy = Math.round(v('saleUsd') * v('rate'));
    const fJpy = Math.round(sJpy * (v('feePercent') / 100));
    const profit = sJpy - (v('cost') + v('shipping') + v('other') + fJpy);
    
    document.getElementById('salesJpy').textContent = fmt(sJpy);
    document.getElementById('feeJpy').textContent = fmt(fJpy);
    const pEl = document.getElementById('profit');
    pEl.textContent = fmt(profit);
    pEl.style.color = profit >= 0 ? '#2ecc71' : '#ff6b6b';
    const pRate = sJpy > 0 ? (profit / sJpy) * 100 : 0;
    document.getElementById('profitRate').textContent = pRate.toFixed(1) + '%';
  }

  ids.forEach(id => inputs[id].addEventListener('input', calc));

  function setShipping(val) { inputs.shipping.value = val; calc(); }
  function toggleBackCalc() { const p = document.getElementById('backCalcPanel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

  function calcBack() {
    const rate = parseFloat(inputs.rate.value) || 150;
    const feeP = parseFloat(inputs.feePercent.value) || 15;
    const costTotal = (parseFloat(inputs.cost.value)||0) + (parseFloat(inputs.shipping.value)||0) + (parseFloat(inputs.other.value)||0);
    const target = parseFloat(document.getElementById('targetProfit').value) || 0;
    const resUsd = ((target + costTotal) / (1 - (feeP / 100))) / rate;
    inputs.saleUsd.value = resUsd.toFixed(2);
    calc();
    showToast(`Price set to ${fmt(resUsd, 'USD')}`);
  }

  function saveRecord() {
    if(!inputs.saleUsd.value) return showToast('Enter price');
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    const profitVal = parseInt(document.getElementById('profit').textContent.replace(/[^0-9-]/g, ''));
    data.unshift({ id: Date.now(), name: inputs.itemName.value || 'Untitled', sale: inputs.saleUsd.value, profit: profitVal });
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    showToast('Saved!');
    updateReport();
  }

  function updateReport() {
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    let total = 0;
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    data.forEach(item => {
      total += item.profit;
      const d = document.createElement('div');
      d.className = 'hist-card';
      d.innerHTML = `<div><b>${item.name}</b><br><small>${fmt(item.sale, 'USD')}</small></div>
                     <b style="color:${item.profit>=0?'#1a9e5c':'#d03a3a'}">${fmt(item.profit)}</b>`;
      list.appendChild(d);
    });
    document.getElementById('monthTotal').textContent = fmt(total);
    const goal = 100000;
    document.getElementById('goalBar').style.width = Math.min(100, (total/goal)*100) + '%';
  }

  function switchTab(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById(id === 'calcPage' ? 'tab-calc' : 'tab-report').classList.add('active');
  }

  function resetInputs() {
    inputs.saleUsd.value = ''; inputs.cost.value = ''; inputs.shipping.value = ''; inputs.itemName.value = '';
    calc(); showToast('Reset');
  }

  function clearAllData() { if(confirm("Clear all?")) { localStorage.removeItem('ebay_pro_data'); updateReport(); } }

  async function fetchRate() {
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      if(data.rates.JPY) {
        inputs.rate.value = Math.floor(data.rates.JPY);
        document.getElementById('rateDisplay').textContent = `${inputs.rate.value}/$`;
        calc();
      }
    } catch(e) {}
  }

  function godCopy(type, btn) {
    let text = "";
    if(type==='title') text = inputs.itemName.value;
    else if(type==='price') text = inputs.saleUsd.value;
    else if(type==='memo') text = `${inputs.itemName.value}\nProfit: ${document.getElementById('profit').textContent}`;
    
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied!');
    });
  }

  window.onload = () => { fetchRate(); updateReport(); };
</script>
</body>
</html>
