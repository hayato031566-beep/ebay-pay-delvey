<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>eBay利益で、デルベイ！ Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --main:    #c0593a;
      --main-h:  #a4472b;
      --main-l:  #f8ece6;
      --accent:  #c0593a;
      --bg:      #f9f7f2;
      --bg2:     #f2ede5;
      --surface: #ffffff;
      --border:  #e8e3db;
      --ink:     #18150f;
      --ink2:    #574e43;
      --ink3:    #9a8e80;
      --green:   #1a9e5c;
      --green-l: #e4f7ee;
      --red:     #d03a3a;
      --red-l:   #fceaea;
      --dollar-bg:  #edf7f2;
      --dollar-bd:  #b8dece;
      --dollar-txt: #1a7f50;
      --yen-bg:     #fef6ea;
      --yen-bd:     #f0d9b0;
      --yen-txt:    #9a6010;
      --r:    14px; --r-sm: 10px; --r-xs: 6px; --r-lg: 20px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); overflow-x: hidden; }

    /* Header */
    .header { background: var(--ink); padding: 13px 18px; display: flex; align-items: center; gap: 11px; position: sticky; top: 0; z-index: 100; }
    .hd-logo { width: 32px; height: 32px; background: var(--main); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .hd-name { font-size: 15px; font-weight: 600; color: #fff; }
    .hd-name span { color: var(--main); }
    .hd-rate { font-size: 11px; color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.08); border-radius: 20px; padding: 4px 10px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .hd-dot { width: 5px; height: 5px; border-radius: 50%; background: #2ecc71; }
    .hd-dot.syncing { background: #f1c40f; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Tabs */
    .tabs { display: flex; background: var(--ink); padding: 0 18px; }
    .tab { flex: 1; padding: 10px 0; text-align: center; color: rgba(255,255,255,0.35); cursor: pointer; font-size: 12.5px; border-bottom: 2px solid transparent; }
    .tab.active { color: #fff; border-bottom-color: var(--main); }

    .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 18px 14px 80px; }
    .page { display: none; }
    .page.active { display: block; }

    /* Card & Forms */
    .card { background: var(--surface); border-radius: var(--r-lg); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
    h2 { font-size: 10px; font-weight: 700; color: var(--ink3); padding: 13px 18px 0; display: flex; align-items: center; gap: 7px; text-transform: uppercase; }
    h2::before { content: ''; width: 3px; height: 12px; background: var(--main); border-radius: 2px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; padding: 12px 18px 18px; }
    .field.full { grid-column: 1 / 3; }
    label { font-size: 9.5px; font-weight: 600; color: var(--ink3); margin-bottom: 6px; display: block; }
    .iw { display: flex; position: relative; }
    .cb { display: flex; align-items: center; justify-content: center; min-width: 36px; font-weight: 700; border-radius: var(--r-sm) 0 0 var(--r-sm); border: 1px solid; border-right: none; }
    .cb.y { background: var(--yen-bg); border-color: var(--yen-bd); color: var(--yen-txt); }
    .cb.d { background: var(--dollar-bg); border-color: var(--dollar-bd); color: var(--dollar-txt); }
    .cb.p { background: var(--bg2); border-color: var(--border); color: var(--ink3); font-size: 13px; }
    input { padding: 11px; border: 1px solid #e5e5e5; border-radius: var(--r-sm); font-size: 15px; width: 100%; background: var(--bg); }
    .iw input { border-radius: 0 var(--r-sm) var(--r-sm) 0; border-left: none; }
    .btn-copy-inline { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--bg2); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; }

    /* Buttons */
    .q-btn { flex: 1; background: var(--bg2); border: 1px solid var(--border); padding: 10px; border-radius: var(--r-sm); font-size: 11.5px; font-weight: 600; cursor: pointer; }
    .btn-toggle { width: calc(100% - 36px); margin: 0 18px 14px; padding: 11px; background: var(--bg2); border: 1px dashed var(--border); border-radius: var(--r-sm); font-size: 12px; cursor: pointer; }
    #backCalcPanel { display: none; background: var(--main-l); padding: 15px 18px; border-top: 1px solid rgba(0,0,0,0.05); }
    .btn-save { width: 100%; padding: 15px; background: var(--main); color: #fff; border: none; border-radius: var(--r-sm); font-weight: 600; font-size: 15px; margin-top: 10px; cursor: pointer; }

    /* Result Box */
    .result-box { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 20px; text-align: center; margin-top: 4px; transition: background 0.3s; }
    .result-box.is-green { background: #0f2e1e; }
    .result-box.is-red { background: #4a1515; }
    #profit { font-size: 52px; font-weight: 300; margin: 4px 0; }

    /* Report & History */
    .report-hero { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 20px; text-align: center; margin-bottom: 10px; }
    #monthTotal { font-size: 44px; font-weight: 300; margin: 10px 0; }
    .bar-bg { background: rgba(255,255,255,0.1); height: 10px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
    .bar-fill { height: 100%; width: 0%; background: var(--main); transition: width 0.6s ease; }
    .sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
    .sum-item { background: var(--surface); padding: 14px; border-radius: var(--r); border: 1.5px solid var(--border); text-align: center; }
    .sum-item b { font-size: 24px; display: block; }
    .hist-card { background: var(--surface); padding: 12px 14px; border-radius: var(--r-sm); margin-bottom: 6px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .hist-del { color: var(--red); background: none; border: none; font-size: 20px; cursor: pointer; }

    /* Toast */
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 12px; display: none; z-index: 1000; }

    /* Ranking System */
    .ranking-trigger { position: fixed; right: 20px; bottom: 25px; width: 64px; height: 64px; background: linear-gradient(135deg, #f1c40f, #d4af37); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 20px rgba(0,0,0,0.4); z-index: 2001; cursor: pointer; border: 2px solid #fff; font-size: 28px; }
    .rank-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh; background: var(--bg); border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); transition: 0.4s; z-index: 2002; overflow-y: auto; padding: 20px 14px; }
    .rank-panel.open { bottom: 0; }
    .rank-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; backdrop-filter: blur(4px); }
    .rank-overlay.show { display: block; }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <div class="hd-logo">📦</div>
  <div class="hd-text" style="flex:1; color:#fff; font-weight:600;">eBay利益で、<span>デルベイ！</span> Pro</div>
  <div class="hd-rate" id="syncRateBtn" onclick="fetchRate()">
    <div class="hd-dot" id="rateDot"></div>
    <span id="rateDisplay">¥---/$</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-calc" onclick="switchTab('calcPage')">利益計算</div>
  <div class="tab" id="tab-report" onclick="switchTab('reportPage')">レポート</div>
</div>

<div class="container">
  <div id="calcPage" class="page active">
    <div class="card">
      <h2>商品情報</h2>
      <div class="form-grid">
        <div class="field full">
          <label>タイトル</label>
          <div class="iw"><input type="text" id="itemName"><button class="btn-copy-inline" onclick="copyText('itemName')">COPY</button></div>
        </div>
        <div class="field full"><button class="q-btn" onclick="generateTemplate()">✨ 定型文を一括コピー</button></div>
      </div>
    </div>

    <div class="card">
      <h2>取引入力</h2>
      <div class="form-grid">
        <div class="field"><label>レート</label><div class="iw"><div class="cb y">¥</div><input type="number" id="rate" value="150"></div></div>
        <div class="field"><label>手数料%</label><div class="iw"><div class="cb p">%</div><input type="number" id="feePercent" value="15"></div></div>
        <div class="field"><label>売値($)</label><div class="iw"><div class="cb d">$</div><input type="number" id="saleUsd"></div></div>
        <div class="field"><label>仕入(¥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="cost"></div></div>
        <div class="field"><label>送料(¥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="shipping"></div></div>
        <div class="field"><label>経費(¥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="other" value="0"></div></div>
      </div>
      <button class="btn-toggle" onclick="toggleBackCalc()">逆算：目標利益から売値を出す</button>
      <div id="backCalcPanel">
        <label>目標純利益 (円)</label>
        <div style="display:flex; gap:8px;"><input type="number" id="targetProfit" value="3000"><button onclick="calcBack()" style="background:var(--main); color:#fff; border:none; border-radius:8px; padding:0 15px;">計算</button></div>
      </div>
    </div>

    <div id="resultBox" class="result-box">
      <div style="display:flex; justify-content:space-between; font-size:10px; opacity:0.6;">
        <span>売上: <span id="salesJpy">¥0</span></span>
        <span>手数料: <span id="feeJpy">¥0</span></span>
      </div>
      <div id="profit">¥0</div>
      <div style="font-size:12px; opacity:0.6;">利益率: <span id="profitRate">0.0%</span></div>
    </div>

    <button class="btn-save" onclick="saveRecord()">この取引を記録する</button>
    <button onclick="resetInputs()" style="width:100%; background:none; border:none; color:var(--ink3); margin-top:15px; cursor:pointer;">リセット</button>
  </div>

  <div id="reportPage" class="page">
    <div class="report-hero">
      <div style="font-size:12px; opacity:0.6;">今月の合計利益</div>
      <div id="monthTotal">¥0</div>
      <div class="bar-bg"><div id="goalBar" class="bar-fill"></div></div>
      <button class="q-btn" style="background:rgba(255,255,255,0.1); color:#fff; border:none;" onclick="setGoal()">目標設定</button>
    </div>
    <div class="sum-grid">
      <div class="sum-item"><div style="color:var(--green); font-size:10px;">黒字</div><b id="plusCount" style="color:var(--green);">0</b></div>
      <div class="sum-item"><div style="color:var(--red); font-size:10px;">赤字</div><b id="minusCount" style="color:var(--red);">0</b></div>
    </div>
    <div id="historyList"></div>
    <button onclick="clearAllData()" style="width:100%; color:var(--red); border:none; background:none; margin-top:20px; font-size:11px; opacity:0.5;">全データ削除</button>
  </div>
</div>

<div class="rank-overlay" id="rankOverlay" onclick="toggleRank()"></div>
<div class="ranking-trigger" onclick="toggleRank()">🏆</div>
<div class="rank-panel" id="rankPanel">
  <div style="width:40px; height:5px; background:#ddd; border-radius:10px; margin:0 auto 15px;" onclick="toggleRank()"></div>
  <h2 style="text-align:center; display:block; margin-bottom:20px;">📊 利益ランキング (TOP)</h2>
  <div id="rankDisplayArea"></div>
</div>

<script>
  const ids = ['itemName', 'rate', 'feePercent', 'saleUsd', 'cost', 'shipping', 'other'];
  const inputs = {};
  ids.forEach(id => inputs[id] = document.getElementById(id));

  window.onload = () => {
    inputs.rate.value = localStorage.getItem('cfg_rate') || 150;
    inputs.feePercent.value = localStorage.getItem('cfg_fee') || 15;
    fetchRate();
    updateReport();
  };

  async function fetchRate() {
    const dot = document.getElementById('rateDot'); dot.classList.add('syncing');
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      inputs.rate.value = Math.round(data.rates.JPY * 100) / 100;
      document.getElementById('rateDisplay').textContent = `¥${inputs.rate.value}/$`;
      calc();
    } catch (e) { showToast("レート取得失敗"); } finally { dot.classList.remove('syncing'); }
  }

  function switchTab(pId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pId).classList.add('active');
    document.getElementById(pId === 'calcPage' ? 'tab-calc' : 'tab-report').classList.add('active');
    if(pId === 'reportPage') updateReport();
  }

  function calc() {
    const val = (id) => parseFloat(inputs[id].value) || 0;
    const sJpy = Math.round(val('saleUsd') * val('rate'));
    const fJpy = Math.round(sJpy * (val('feePercent') / 100));
    const profit = sJpy - (val('cost') + val('shipping') + val('other') + fJpy);
    
    document.getElementById('salesJpy').textContent = '¥' + sJpy.toLocaleString();
    document.getElementById('feeJpy').textContent = '¥' + fJpy.toLocaleString();
    const pEl = document.getElementById('profit');
    pEl.textContent = (profit >= 0 ? '¥' : '-¥') + Math.abs(profit).toLocaleString();
    pEl.style.color = profit >= 0 ? '#2ecc71' : '#ff6b6b';
    document.getElementById('resultBox').className = 'result-box ' + (profit >= 0 ? 'is-green' : 'is-red');
    document.getElementById('profitRate').textContent = (sJpy > 0 ? (profit/sJpy*100).toFixed(1) : '0.0') + '%';
  }
  ids.forEach(id => inputs[id].addEventListener('input', calc));

  function saveRecord() {
    if(!inputs.saleUsd.value) return showToast('売値を入力してください');
    const profitVal = parseInt(document.getElementById('profit').textContent.replace(/[¥,]/g, ''));
    const record = { id: Date.now(), name: inputs.itemName.value || '無題', sale: inputs.saleUsd.value, profit: profitVal };
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data.unshift(record);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    showToast('記録しました！');
  }

  function updateReport() {
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    const goal = parseInt(localStorage.getItem('cfg_goal') || 100000);
    let mSum = 0, pCount = 0, mCount = 0;
    const listEl = document.getElementById('historyList');
    listEl.innerHTML = '';
    data.forEach(item => {
      mSum += item.profit;
      if(item.profit >= 0) pCount++; else mCount++;
      const div = document.createElement('div');
      div.className = 'hist-card';
      div.innerHTML = `<div><b>${item.name}</b><br><small>$${item.sale}</small></div>
                       <div style="display:flex;align-items:center;"><b style="color:${item.profit>=0?'var(--green)':'var(--red)'}">¥${item.profit.toLocaleString()}</b>
                       <button class="hist-del" onclick="deleteItem(${item.id})">×</button></div>`;
      listEl.appendChild(div);
    });
    document.getElementById('monthTotal').textContent = '¥' + mSum.toLocaleString();
    document.getElementById('plusCount').textContent = pCount;
    document.getElementById('minusCount').textContent = mCount;
    document.getElementById('goalBar').style.width = Math.min(100, (mSum/goal*100)) + '%';
  }

  function deleteItem(id) {
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data = data.filter(i => i.id !== id);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    updateReport();
    if(document.getElementById('rankPanel').classList.contains('open')) updateRank();
  }

  function toggleRank() {
    const p = document.getElementById('rankPanel');
    const o = document.getElementById('rankOverlay');
    p.classList.toggle('open'); o.classList.toggle('show');
    if(p.classList.contains('open')) updateRank();
  }

  function updateRank() {
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    const sorted = [...data].sort((a,b) => b.profit - a.profit);
    const area = document.getElementById('rankDisplayArea');
    area.innerHTML = '';
    sorted.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'hist-card';
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      div.innerHTML = `<div><span>${medal}</span> <b>${item.name}</b></div><b style="color:${item.profit>=0?'var(--green)':'var(--red)'}">¥${item.profit.toLocaleString()}</b>`;
      area.appendChild(div);
    });
  }

  function toggleBackCalc() { const p = document.getElementById('backCalcPanel'); p.style.display = p.style.display==='block'?'none':'block'; }
  function calcBack() {
    const target = parseFloat(document.getElementById('targetProfit').value)||0;
    const res = (target + (parseFloat(inputs.cost.value)||0) + (parseFloat(inputs.shipping.value)||0) + (parseFloat(inputs.other.value)||0)) / (parseFloat(inputs.rate.value) * (1 - parseFloat(inputs.feePercent.value)/100));
    inputs.saleUsd.value = Math.ceil(res); calc();
  }
  function resetInputs() { ['itemName','saleUsd','cost','shipping','other'].forEach(id => inputs[id].value = (id==='other'?0:'')); calc(); }
  function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none',2000); }
  function copyText(id) { navigator.clipboard.writeText(document.getElementById(id).value); showToast("コピー完了"); }
  function generateTemplate() { const t = `Title: ${inputs.itemName.value}\nPrice: $${inputs.saleUsd.value}`; navigator.clipboard.writeText(t); showToast("定型文コピー"); }
  function setGoal() { const g = prompt('目標月利', '100000'); if(g){localStorage.setItem('cfg_goal', g); updateReport();} }
  function clearAllData() { if(confirm('全削除？')){localStorage.removeItem('ebay_pro_data'); updateReport();} }
</script>
</body>
</html>
