<style>
  /* ランキング専用の浮き出るボタン */
  .ranking-trigger {
    position: fixed;
    right: 20px;
    bottom: 25px;
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #f1c40f, #d4af37);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    z-index: 2001;
    cursor: pointer;
    border: 2px solid #fff;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .ranking-trigger:active { transform: scale(0.9); }
  .ranking-trigger span { font-size: 28px; }

  /* 下からスッと出るパネル（スマホで一番使いやすい形） */
  .rank-panel {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    height: 85vh; /* 画面の85%まで上がる */
    background: var(--bg);
    border-top-left-radius: 25px;
    border-top-right-radius: 25px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    z-index: 2002;
    overflow-y: auto;
    padding: 20px 14px 100px;
  }
  .rank-panel.open { bottom: 0; }

  /* パネルを閉じるためのバツ印 */
  .close-rank {
    width: 40px;
    height: 5px;
    background: var(--border);
    border-radius: 10px;
    margin: 0 auto 20px;
    cursor: pointer;
  }
  
  /* 暗くなる背景（オーバーレイ） */
  .rank-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: none;
    z-index: 2000;
  }
  .rank-overlay.show { display: block; }
</style>

<div class="rank-overlay" id="rankOverlay" onclick="closeRank()"></div>
<div class="ranking-trigger" onclick="openRank()">
  <span>🏆</span>
</div>

<div class="rank-panel" id="rankPanel">
  <div class="close-rank" onclick="closeRank()"></div>
  <h2 style="text-align:center; font-size:18px; color:var(--ink); margin-bottom:20px; display:block;">
    📊 利益ランキング
  </h2>
  <div id="rankDisplayArea"></div>
</div>

<script>
  function openRank() {
    // 既存の updateReport 関数を呼び出して最新データを読み込む
    if (typeof updateReport === 'function') {
      updateReport('all');
    }
    
    // 既存の reportPage の中身を丸ごとコピーして表示
    const reportHTML = document.getElementById('reportPage').innerHTML;
    document.getElementById('rankDisplayArea').innerHTML = reportHTML;
    
    // パネルを表示
    document.getElementById('rankPanel').classList.add('open');
    document.getElementById('rankOverlay').classList.add('show');
    
    // スクロールを一番上にする
    document.getElementById('rankPanel').scrollTop = 0;
  }

  function closeRank() {
    document.getElementById('rankPanel').classList.remove('open');
    document.getElementById('rankOverlay').classList.remove('show');
  }

  // もし既存の deleteItem や setGoal がパネル内でも動くように、
  // クリックイベントを一部調整する仕組み（元の関数をそのまま使う）
</script>
