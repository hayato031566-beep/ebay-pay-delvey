<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>eBay利益で、デルベイ！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --main:    #c0593a;
      --main-h:  #a4472b;
      --main-l:  #f8ece6;
      --accent:  #c0593a;
      --bg:      #f9f7f2;
      --bg2:     #f2ede5;
      --surface: #ffffff;
      --border:  #e8e3db;
      --ink:     #18150f;
      --ink2:    #574e43;
      --ink3:    #9a8e80;
      --green:   #1a9e5c;
      --green-l: #e4f7ee;
      --red:     #d03a3a;
      --red-l:   #fceaea;
      --dollar-bg:  #edf7f2;
      --dollar-bd:  #b8dece;
      --dollar-txt: #1a7f50;
      --yen-bg:     #fef6ea;
      --yen-bd:     #f0d9b0;
      --yen-txt:    #9a6010;
      --r:    14px;
      --r-sm: 10px;
      --r-xs:  6px;
      --r-lg: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--ink);
      padding: 13px 18px 11px;
      display: flex; align-items: center; gap: 11px;
      position: sticky; top: 0; z-index: 100;
    }
    .hd-logo {
      width: 32px; height: 32px; background: var(--main);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hd-logo svg { display: block; }
    .hd-text { flex: 1; }
    .hd-name { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.025em; line-height: 1.15; }
    .hd-name span { color: var(--main); }
    .hd-sub  { font-size: 9.5px; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; margin-top: 1px; }
    .hd-rate {
      font-size: 11px; color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 4px 10px;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
      cursor: pointer; /* 自動取得用にクリック可能に */
    }
    .hd-dot { width: 5px; height: 5px; border-radius: 50%; background: #2ecc71; }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 18px;
    }
    .tab {
      flex: 1; padding: 10px 0 9px; text-align: center;
      color: rgba(255,255,255,0.35); cursor: pointer;
      font-size: 12.5px; font-weight: 400;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: #fff; border-bottom-color: var(--main); font-weight: 500; }

    /* ── Layout ── */
    .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 18px 14px 60px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── Card ── */
    .card {
      background: var(--surface); border-radius: var(--r-lg);
      border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden;
    }
    h2 {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink3);
      margin: 0; padding: 13px 18px 0;
      display: flex; align-items: center; gap: 7px;
    }
    h2::before { content: ''; width: 3px; height: 12px; background: var(--main); border-radius: 2px; flex-shrink: 0; }

    /* ── Form grid ── */
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 13px; padding: 12px 18px 18px;
    }
    .field { display: flex; flex-direction: column; margin-bottom: 0; }
    .field.full { grid-column: 1 / 3; }

    label {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.09em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }

    /* ── Input with currency badge ── */
    .iw { display: flex; align-items: stretch; }
    .cb {
      display: flex; align-items: center; justify-content: center;
      min-width: 36px; padding: 0 10px;
      font-size: 15px; font-weight: 700;
      border-radius: var(--r-sm) 0 0 var(--r-sm);
      border: 1px solid; border-right: none;
      flex-shrink: 0; letter-spacing: -0.02em;
    }
    .cb.d { background: var(--dollar-bg); border-color: var(--dollar-bd); color: var(--dollar-txt); }
    .cb.y { background: var(--yen-bg);    border-color: var(--yen-bd);    color: var(--yen-txt); }
    .cb.p { background: var(--bg2);       border-color: var(--border);    color: var(--ink3); font-size: 13px; }

    input {
      padding: 11px 12px;
      border: 1px solid #e5e5e5; border-radius: var(--r-sm);
      font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 400;
      color: var(--ink); background: var(--bg); width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      -webkit-appearance: none; min-height: 44px;
    }
    .iw input {
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      border-left: none; flex: 1;
    }
    input::placeholder { color: var(--ink3); opacity: 0.5; font-size: 13px; }
    input:focus {
      border-color: var(--main); background: var(--surface);
      box-shadow: 0 0 0 3px rgba(192,89,58,0.10);
    }

    /* ── Quick buttons ── */
    .quick-group { display: flex; gap: 7px; margin-top: 8px; }
    .q-btn {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      padding: 10px 4px; border-radius: var(--r-sm);
      font-size: 11.5px; font-weight: 600; color: var(--ink2);
      cursor: pointer; min-height: 44px; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── Result box ── */
    .result-box {
      background: var(--ink); color: #fff;
      border-radius: var(--r-lg); padding: 20px 20px 18px;
      text-align: center; margin-top: 4px;
      position: relative; overflow: hidden;
    }
    #profit {
      font-size: 56px; font-weight: 300; letter-spacing: -0.05em;
      line-height: 1; margin: 4px 0 6px;
    }

    /* 🔥 追加: ワンタップコピーボタン群 */
    .copy-actions { display: flex; gap: 8px; justify-content: center; margin-top: 15px; }
    .copy-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 8px 12px; border-radius: var(--r-sm);
      font-size: 11px; cursor: pointer; transition: 0.2s;
    }
    .copy-btn:active { background: var(--main); }

    /* ── Report ── */
    .report-hero {
      background: var(--ink); color: #fff; border-radius: var(--r-lg);
      padding: 20px; margin-bottom: 10px; text-align: center;
    }
    #monthTotal { font-size: 44px; font-weight: 300; margin: 10px 0; cursor: pointer; }

    /* 🔥 追加: 利益ランキングセクション */
    .rank-section { margin-top: 20px; }
    .rank-title { font-size: 11px; font-weight: 700; color: var(--ink3); margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
    
    .sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
    .sum-item {
      background: var(--surface); padding: 14px 12px; border-radius: var(--r);
      text-align: center; cursor: pointer; border: 1.5px solid var(--border);
    }
    .sum-item.active-filter { border-color: var(--main); background: var(--main-l); }

    .hist-card {
      background: var(--surface); padding: 12px 14px;
      border-radius: var(--r-sm); margin-bottom: 6px;
      border: 1px solid var(--border); display: flex;
      justify-content: space-between; align-items: center;
    }
    .hist-del { color: var(--red); background: none; border: none; font-size: 18px; cursor: pointer; }

    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 20px;
      font-size: 12px; display: none; z-index: 1000;
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <div class="hd-logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
  </div>
  <div class="hd-text">
    <div class="hd-name">eBay利益で、<span>デルベイ！</span></div>
    <div class="hd-sub">eBay輸出 利益計算ツール</div>
  </div>
  <div class="hd-rate" onclick="fetchExchangeRate()"><div class="hd-dot"></div><span id="rateDisplay">¥150/$</span></div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-calc" onclick="switchTab('calcPage')">利益計算</div>
  <div class="tab" id="tab-report" onclick="switchTab('reportPage')">集計レポート</div>
</div>

<div class="container">
  <div id="calcPage" class="page active">
    <div class="card">
      <h2>商品メモ</h2>
      <div class="form-grid" style="padding-top:10px;">
        <div class="field full"><input type="text" id="itemName" placeholder="商品名を入力"></div>
      </div>
    </div>

    <div class="card">
      <h2>取引情報を入力</h2>
      <div class="form-grid">
        <div class="field"><label>為替レート</label><div class="iw"><div class="cb y">¥</div><input type="number" id="rate" value="150"></div></div>
        <div class="field"><label>eBay手数料</label><div class="iw"><div class="cb p">%</div><input type="number" id="feePercent" value="15"></div></div>
        <div class="field"><label>売値 ($)</label><div class="iw"><div class="cb d">$</div><input type="number" id="saleUsd"></div></div>
        <div class="field"><label>仕入れ (￥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="cost"></div></div>
        <div class="field"><label>国際送料 (￥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="shipping"></div>
          <div class="quick-group">
            <button class="q-btn" onclick="setShipping(3000)">✈ FedEx<small>¥3,000</small></button>
            <button class="q-btn" onclick="setShipping(5000)">📦 EMS<small>¥5,000</small></button>
          </div>
        </div>
        <div class="field"><label>経費 (￥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="other" value="0"></div></div>
      </div>
    </div>

    <div class="result-box">
      <div style="display:flex; justify-content:space-between; font-size:10.5px; opacity:0.4;">
        <span>売上 <span id="salesJpy">¥0</span></span><span>手数料 <span id="feeJpy">¥0</span></span>
      </div>
      <div id="profit">¥0</div>
      <div id="profitRate">利益率 0.0%</div>

      <div class="copy-actions">
        <button class="copy-btn" onclick="copyValue('name')">あ コピー</button>
        <button class="copy-btn" onclick="copyValue('price')">い ($)コピー</button>
        <button class="copy-btn" onclick="copyValue('all')">全部コピー</button>
      </div>
    </div>

    <button class="btn-save" onclick="saveRecord()" style="width:100%; padding:15px; background:var(--main); color:#fff; border:none; border-radius:var(--r-sm); font-weight:600; margin-top:10px;">この利益を記録する</button>
  </div>

  <div id="reportPage" class="page">
    <div class="report-hero">
      <h2>📈 今月の合計利益</h2>
      <div id="monthTotal" onclick="updateReport('all')">¥0</div>
    </div>

    <div class="sum-grid">
      <div class="sum-item" id="filter-plus" onclick="updateReport('plus')"><div style="color:var(--green);">黒字</div><b id="plusCount">0</b></div>
      <div class="sum-item" id="filter-minus" onclick="updateReport('minus')"><div style="color:var(--red);">赤字</div><b id="minusCount">0</b></div>
    </div>

    <div class="rank-section" id="rankingArea" style="display:none;">
      <div class="rank-title">🔥 利益ランキング（TOP 5）</div>
      <div id="rankList"></div>
    </div>

    <div class="rank-title" style="margin-top:20px;">📋 履歴一覧</div>
    <div id="historyList"></div>
    <button class="btn-reset" style="color:var(--red); width:100%; opacity:0.5; background:none; border:none; margin-top:20px;" onclick="clearAllData()">データを全削除</button>
  </div>
</div>

<script>
  const ids = ['itemName', 'rate', 'feePercent', 'saleUsd', 'cost', 'shipping', 'other'];
  const inputs = {};
  ids.forEach(id => inputs[id] = document.getElementById(id));

  // 🔥 為替レート自動取得
  async function fetchExchangeRate() {
    showToast("為替を取得中...");
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      const jpy = data.rates.JPY.toFixed(2);
      inputs.rate.value = jpy;
      document.getElementById('rateDisplay').textContent = `¥${jpy}/$`;
      calc();
      showToast(`最新レート ¥${jpy} をセットしました`);
    } catch (e) { showToast("取得失敗。手入力してください"); }
  }

  function calc() {
    const val = (id) => parseFloat(inputs[id].value) || 0;
    const sJpy = Math.round(val('saleUsd') * val('rate'));
    const fJpy = Math.round(sJpy * (val('feePercent') / 100));
    const profit = sJpy - (val('cost') + val('shipping') + val('other') + fJpy);
    const pRate = sJpy > 0 ? (profit / sJpy) * 100 : 0;

    document.getElementById('salesJpy').textContent = '¥' + sJpy.toLocaleString();
    document.getElementById('feeJpy').textContent = '¥' + fJpy.toLocaleString();
    const pEl = document.getElementById('profit');
    pEl.textContent = (profit >= 0 ? '¥' : '-¥') + Math.abs(profit).toLocaleString();
    pEl.style.color = profit >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('profitRate').textContent = '利益率 ' + pRate.toFixed(1) + '%';
  }
  ids.forEach(id => inputs[id].addEventListener('input', calc));

  // 🔥 ワンタップコピー
  function copyValue(type) {
    let text = "";
    if(type === 'name') text = inputs.itemName.value || "商品名なし";
    if(type === 'price') text = `$${inputs.saleUsd.value || "0"}`;
    if(type === 'all') text = `${inputs.itemName.value || "商品名なし"}\n価格: $${inputs.saleUsd.value || "0"}\n利益: ${document.getElementById('profit').textContent}`;
    
    navigator.clipboard.writeText(text).then(() => showToast("コピーしました！"));
  }

  function saveRecord() {
    if(!inputs.saleUsd.value) return showToast('売値を入力してください');
    const profitText = document.getElementById('profit').textContent.replace(/[¥,]/g, '');
    const profitVal = parseInt(profitText.replace('-', '')) * (profitText.includes('-') ? -1 : 1);
    const record = { id: Date.now(), name: inputs.itemName.value || '無題', sale: inputs.saleUsd.value, profit: profitVal };
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data.unshift(record);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    showToast('利益を記録しました！');
  }

  function updateReport(filter = 'all') {
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    let mSum = 0, pc = 0, mc = 0;
    const listEl = document.getElementById('historyList');
    const rankEl = document.getElementById('rankList');
    listEl.innerHTML = '';
    rankEl.innerHTML = '';

    // 🔥 利益ランキング（上位5件）
    if(data.length > 0) {
      document.getElementById('rankingArea').style.display = 'block';
      const sorted = [...data].sort((a, b) => b.profit - a.profit).slice(0, 5);
      sorted.forEach((item, idx) => {
        rankEl.innerHTML += `<div style="font-size:12px; margin-bottom:5px; color:var(--ink2)">${idx+1}位: ${item.name} (¥${item.profit.toLocaleString()})</div>`;
      });
    }

    data.forEach(item => {
      mSum += item.profit;
      if(item.profit >= 0) pc++; else mc++;
      if(filter === 'all' || (filter === 'plus' && item.profit >= 0) || (filter === 'minus' && item.profit < 0)) {
        listEl.innerHTML += `<div class="hist-card"><div><b>${item.name}</b><br><small>$${item.sale}</small></div>
          <div style="display:flex;align-items:center;"><b style="color:${item.profit>=0?'var(--green)':'var(--red)'}">¥${item.profit.toLocaleString()}</b>
          <button class="hist-del" onclick="deleteItem(${item.id})">×</button></div></div>`;
      }
    });
    document.getElementById('monthTotal').textContent = '¥' + mSum.toLocaleString();
    document.getElementById('plusCount').textContent = pc;
    document.getElementById('minusCount').textContent = mc;
  }

  function deleteItem(id) {
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data = data.filter(i => i.id !== id);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    updateReport();
  }

  function switchTab(pId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pId).classList.add('active');
    document.getElementById(pId === 'calcPage' ? 'tab-calc' : 'tab-report').classList.add('active');
    if(pId === 'reportPage') updateReport();
  }

  function setShipping(v) { inputs.shipping.value = v; calc(); }
  function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
  function clearAllData() { if(confirm("全データを削除しますか？")){localStorage.removeItem('ebay_pro_data'); updateReport();}}
  window.onload = () => { fetchExchangeRate(); };
</script>
</body>
</html>
