<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>eBay利益で、デルベイ！ Pro + Ranking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --main:    #c0593a; --main-h:  #a4472b; --main-l:  #f8ece6;
      --accent:  #c0593a; --bg:      #f9f7f2; --bg2:     #f2ede5;
      --surface: #ffffff; --border:  #e8e3db; --ink:     #18150f;
      --ink2:    #574e43; --ink3:    #9a8e80; --green:   #1a9e5c;
      --red:     #d03a3a; --dollar-bg: #edf7f2; --yen-bg: #fef6ea;
      --r-lg: 20px; --r-sm: 10px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); overflow-x: hidden; }

    /* --- Header --- */
    .header { background: var(--ink); padding: 13px 18px; display: flex; align-items: center; gap: 11px; position: sticky; top: 0; z-index: 100; }
    .hd-logo { width: 32px; height: 32px; background: var(--main); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .hd-text { flex: 1; }
    .hd-name { font-size: 15px; font-weight: 600; color: #fff; }
    .hd-name span { color: var(--main); }
    .hd-rate { font-size: 11px; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .hd-dot { width: 5px; height: 5px; border-radius: 50%; background: #2ecc71; }
    .hd-dot.syncing { background: #f1c40f; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    /* --- Tabs --- */
    .tabs { display: flex; background: var(--ink); padding: 0 18px; }
    .tab { flex: 1; padding: 10px 0; text-align: center; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; }
    .tab.active { color: #fff; border-bottom-color: var(--main); }

    /* --- Layout --- */
    .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 18px 14px 100px; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: var(--surface); border-radius: var(--r-lg); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
    h2 { font-size: 10px; font-weight: 700; color: var(--ink3); padding: 13px 18px 0; display: flex; align-items: center; gap: 7px; text-transform: uppercase; }
    h2::before { content: ''; width: 3px; height: 12px; background: var(--main); border-radius: 2px; }

    /* --- Forms --- */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; padding: 12px 18px 18px; }
    .field { display: flex; flex-direction: column; }
    .field.full { grid-column: 1 / 3; }
    label { font-size: 9px; font-weight: 600; color: var(--ink3); margin-bottom: 5px; }
    .iw { display: flex; position: relative; }
    .cb { width: 36px; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1px solid var(--border); border-right: none; border-radius: var(--r-sm) 0 0 var(--r-sm); }
    .cb.y { background: var(--yen-bg); color: #9a6010; }
    .cb.d { background: var(--dollar-bg); color: #1a7f50; }
    input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 0 var(--r-sm) var(--r-sm) 0; font-size: 15px; background: var(--bg); }
    
    .btn-copy-inline { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--bg2); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; }
    .q-btn { flex: 1; background: var(--bg2); border: 1px solid var(--border); padding: 8px; border-radius: var(--r-sm); font-size: 11px; cursor: pointer; }
    
    /* --- Back-calc --- */
    .btn-toggle { width: calc(100% - 36px); margin: 0 18px 14px; padding: 10px; background: var(--bg2); border: 1px dashed var(--border); border-radius: var(--r-sm); font-size: 12px; cursor: pointer; }
    #backCalcPanel { display: none; background: var(--main-l); padding: 15px 18px; }

    /* --- Result --- */
    .result-box { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 20px; text-align: center; transition: 0.4s; }
    .result-box.is-red { background: #4a1515; }
    .result-box.is-green { background: #0f2e1e; }
    #profit { font-size: 52px; font-weight: 300; margin: 5px 0; }

    .btn-save { width: 100%; padding: 16px; background: var(--main); color: #fff; border: none; border-radius: var(--r-sm); font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; }

    /* --- Ranking Popup (🏆) --- */
    .ranking-trigger { position: fixed; right: 20px; bottom: 25px; width: 64px; height: 64px; background: linear-gradient(135deg, #f1c40f, #d4af37); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 20px rgba(0,0,0,0.4); z-index: 2001; cursor: pointer; border: 2px solid #fff; }
    .rank-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh; background: var(--bg); border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); transition: 0.4s; z-index: 2002; overflow-y: auto; padding: 20px 14px; }
    .rank-panel.open { bottom: 0; }
    .rank-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; backdrop-filter: blur(4px); }
    .rank-overlay.show { display: block; }
    
    /* --- Report Components --- */
    .report-hero { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 20px; text-align: center; margin-bottom: 10px; }
    .bar-bg { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--main); transition: 0.6s; }
    .hist-card { background: #fff; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .hist-del { color: var(--red); background: none; border: none; font-size: 18px; cursor: pointer; }

    #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 12px; display: none; z-index: 3000; }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <div class="hd-logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
  <div class="hd-text"><div class="hd-name">eBay利益で、<span>デルベイ！</span> Pro</div></div>
  <div class="hd-rate" onclick="fetchRate()"><div class="hd-dot" id="rateDot"></div><span id="rateDisplay">¥---/$</span></div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-calc" onclick="switchTab('calcPage')">利益計算</div>
  <div class="tab" id="tab-report" onclick="switchTab('reportPage')">レポート</div>
</div>

<div class="container">
  <div id="calcPage" class="page active">
    <div class="card">
      <h2>商品情報</h2>
      <div class="form-grid">
        <div class="field full">
          <label>タイトル</label>
          <div class="iw"><input type="text" id="itemName" placeholder="Item Name"><button class="btn-copy-inline" onclick="copyText('itemName')">COPY</button></div>
        </div>
        <button class="q-btn" onclick="generateTemplate()" style="grid-column: 1/3;">✨ 定型文を一括コピー</button>
      </div>
    </div>

    <div class="card">
      <h2>取引入力</h2>
      <div class="form-grid">
        <div class="field"><label>レート</label><div class="iw"><div class="cb y">¥</div><input type="number" id="rate" value="150"></div></div>
        <div class="field"><label>手数料(%)</label><div class="iw"><div class="cb">%</div><input type="number" id="feePercent" value="15"></div></div>
        <div class="field full"><label>売値 ($)</label><div class="iw"><div class="cb d">$</div><input type="number" id="saleUsd" placeholder="0.00"><button class="btn-copy-inline" onclick="copyText('saleUsd', '$')">COPY</button></div></div>
        <div class="field"><label>仕入れ(¥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="cost" placeholder="0"></div></div>
        <div class="field"><label>送料(¥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="shipping" placeholder="0"></div></div>
        <div class="field"><label>経費(¥)</label><div class="iw"><div class="cb y">¥</div><input type="number" id="other" value="0"></div></div>
      </div>
      <button class="btn-toggle" onclick="toggleBackCalc()">逆算：目標利益から売値を出す</button>
      <div id="backCalcPanel">
        <label>目標利益(¥)</label>
        <div style="display:flex; gap:8px;"><input type="number" id="targetProfit" value="3000"><button onclick="calcBack()" style="background:var(--main); color:#fff; border:none; border-radius:8px; padding:0 10px;">計算</button></div>
      </div>
    </div>

    <div id="resultBox" class="result-box">
      <div style="display:flex; justify-content:space-between; opacity:0.5; font-size:10px;">
        <span>売上: <span id="salesJpy">¥0</span></span>
        <span>手数料: <span id="feeJpy">¥0</span></span>
      </div>
      <div id="profit">¥0</div>
      <div style="font-size:12px; opacity:0.5;">利益率: <span id="profitRate">0.0%</span></div>
    </div>
    <button class="btn-save" onclick="saveRecord()">この取引を記録する</button>
  </div>

  <div id="reportPage" class="page">
    <div class="report-hero">
      <div style="font-size:12px; opacity:0.6;">今月の合計利益</div>
      <div id="monthTotal" style="font-size:40px; font-weight:300;">¥0</div>
      <div class="bar-bg"><div id="goalBar" class="bar-fill"></div></div>
      <button class="q-btn" onclick="setGoal()" style="background:rgba(255,255,255,0.1); color:#fff; border:none;">目標設定</button>
    </div>
    <div id="historyList"></div>
    <button onclick="clearAllData()" style="width:100%; color:var(--red); border:none; background:none; margin-top:20px; font-size:11px; opacity:0.5;">全データ削除</button>
  </div>
</div>

<div class="rank-overlay" id="rankOverlay" onclick="toggleRank()"></div>
<div class="ranking-trigger" onclick="toggleRank()"><span>🏆</span></div>
<div class="rank-panel" id="rankPanel">
  <div style="width:40px; height:5px; background:#ddd; border-radius:10px; margin:0 auto 15px;" onclick="toggleRank()"></div>
  <h2 style="text-align:center; margin-bottom:15px;">📊 クイックランキング</h2>
  <div id="rankDisplayArea"></div>
</div>

<script>
  const ids = ['itemName', 'rate', 'feePercent', 'saleUsd', 'cost', 'shipping', 'other'];
  const el = {};
  ids.forEach(id => el[id] = document.getElementById(id));

  window.onload = () => { fetchRate(); updateReport(); };

  async function fetchRate() {
    const dot = document.getElementById('rateDot');
    dot.classList.add('syncing');
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      el.rate.value = Math.round(data.rates.JPY * 100) / 100;
      document.getElementById('rateDisplay').textContent = `¥${el.rate.value}/$`;
      calc();
    } catch(e) { showToast("レート取得失敗"); }
    dot.classList.remove('syncing');
  }

  function switchTab(pId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(pId).classList.add('active');
    document.getElementById(pId === 'calcPage' ? 'tab-calc' : 'tab-report').classList.add('active');
  }

  function calc() {
    const rate = parseFloat(el.rate.value) || 0;
    const sUsd = parseFloat(el.saleUsd.value) || 0;
    const cost = parseFloat(el.cost.value) || 0;
    const ship = parseFloat(el.shipping.value) || 0;
    const other = parseFloat(el.other.value) || 0;
    const feeP = parseFloat(el.feePercent.value) || 0;

    const sJpy = Math.round(sUsd * rate);
    const fJpy = Math.round(sJpy * (feeP / 100));
    const profit = sJpy - cost - ship - other - fJpy;
    
    document.getElementById('salesJpy').textContent = '¥' + sJpy.toLocaleString();
    document.getElementById('feeJpy').textContent = '¥' + fJpy.toLocaleString();
    document.getElementById('profitRate').textContent = (sJpy > 0 ? (profit/sJpy*100).toFixed(1) : 0) + '%';
    
    const pEl = document.getElementById('profit');
    const box = document.getElementById('resultBox');
    pEl.textContent = (profit >= 0 ? '¥' : '-¥') + Math.abs(profit).toLocaleString();
    pEl.style.color = profit >= 0 ? '#2ecc71' : '#ff6b6b';
    box.className = profit >= 0 ? 'result-box is-green' : 'result-box is-red';
  }
  ids.forEach(id => el[id].addEventListener('input', calc));

  function saveRecord() {
    if(!el.saleUsd.value) return showToast("売値を入れてね");
    const pVal = parseInt(document.getElementById('profit').textContent.replace(/[¥,]/g,'').replace('-','')) * (document.getElementById('profit').textContent.includes('-') ? -1 : 1);
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data.unshift({ id: Date.now(), name: el.itemName.value || '無題', profit: pVal, sale: el.saleUsd.value });
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    showToast("記録完了！");
    updateReport();
  }

  function updateReport() {
    const data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    const goal = parseInt(localStorage.getItem('cfg_goal') || 100000);
    let total = 0;
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    data.forEach(item => {
      total += item.profit;
      const div = document.createElement('div');
      div.className = 'hist-card';
      div.innerHTML = `<div><b>${item.name}</b><br><small>$${item.sale}</small></div>
                       <div style="display:flex;align-items:center;"><b style="color:${item.profit>=0?'var(--green)':'var(--red)'}">¥${item.profit.toLocaleString()}</b>
                       <button class="hist-del" onclick="deleteItem(${item.id})">×</button></div>`;
      list.appendChild(div);
    });
    document.getElementById('monthTotal').textContent = '¥' + total.toLocaleString();
    document.getElementById('goalBar').style.width = Math.min(100, (total/goal*100)) + '%';
  }

  function deleteItem(id) {
    let data = JSON.parse(localStorage.getItem('ebay_pro_data') || '[]');
    data = data.filter(i => i.id !== id);
    localStorage.setItem('ebay_pro_data', JSON.stringify(data));
    updateReport();
  }

  function toggleRank() {
    const panel = document.getElementById('rankPanel');
    const overlay = document.getElementById('rankOverlay');
    panel.classList.toggle('open');
    overlay.classList.toggle('show');
    if(panel.classList.contains('open')) {
      updateReport();
      document.getElementById('rankDisplayArea').innerHTML = document.getElementById('historyList').innerHTML;
    }
  }

  function calcBack() {
    const target = parseFloat(document.getElementById('targetProfit').value) || 0;
    const rate = parseFloat(el.rate.value);
    const fee = parseFloat(el.feePercent.value) / 100;
    const res = (target + (parseFloat(el.cost.value)||0) + (parseFloat(el.shipping.value)||0) + (parseFloat(el.other.value)||0)) / (rate * (1 - fee));
    el.saleUsd.value = Math.ceil(res);
    calc();
    showToast('売値をセットしました');
  }

  function copyText(id, pre='') { navigator.clipboard.writeText(pre + document.getElementById(id).value); showToast("コピーしたよ"); }
  function generateTemplate() { const txt = `Title: ${el.itemName.value}\nPrice: $${el.saleUsd.value}`; navigator.clipboard.writeText(txt); showToast("定型文コピーしたよ"); }
  function setGoal() { const g = prompt('目標月利', '100000'); if(g) { localStorage.setItem('cfg_goal', g); updateReport(); } }
  function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
  function clearAllData() { if(confirm('全消去するよ？')) { localStorage.removeItem('ebay_pro_data'); updateReport(); } }
  function toggleBackCalc() { const p = document.getElementById('backCalcPanel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
</script>
</body>
</html>
